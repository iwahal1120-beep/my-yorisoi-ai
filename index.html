<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h寄り添いAIパートナー</title>
    <style>
        :root { --main-color: #ffb7b7; --bg-color: #fdf6f0; }
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #app-container { width: 95%; max-width: 450px; height: 92vh; background: white; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; position: relative; border: 4px solid var(--main-color); }
        .header { background: var(--main-color); color: white; padding: 18px; font-weight: bold; text-align: center; font-size: 1.2rem; letter-spacing: 1px; }
        
        .screen { flex: 1; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; }
        .setup-item { margin-bottom: 25px; text-align: center; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ffdada; border-radius: 20px; outline: none; font-size: 18px; text-align: center; background: #fff9f9; }
        
        .gender-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
        .g-btn { flex: 1; padding: 12px; border-radius: 15px; border: 2px solid #eee; background: #f9f9f9; cursor: pointer; font-weight: bold; }
        .g-btn.active { background: var(--main-color); color: white; border-color: var(--main-color); box-shadow: 0 4px 10px rgba(255,183,183,0.5); }
        
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .char-card { border: 2px solid #eee; border-radius: 20px; padding: 12px; text-align: center; cursor: pointer; background: white; transition: 0.3s; position: relative; }
        .char-card .img-placeholder { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(45deg, #ff9a9e, #fad0c4); margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.5rem; }
        .char-card.selected { border-color: var(--main-color); background: #fff5f5; transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .char-card.selected::after { content: '❤'; position: absolute; top: 10px; right: 10px; color: var(--main-color); }

        #chat-screen { display: none; flex-direction: column; height: 100%; padding: 0; background: #fffafb; }
        #portrait-area { height: 220px; display: flex; justify-content: center; align-items: center; background: linear-gradient(to bottom, #fff0f3, #ffffff); border-bottom: 2px solid #f0f0f0; }
        .visual-box { width: 160px; height: 160px; border-radius: 20px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 4rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 18px; border-radius: 22px; max-width: 80%; font-size: 1rem; line-height: 1.6; position: relative; }
        .ai-msg { background: white; align-self: flex-start; border: 1.5px solid #ffe4e6; color: #444; border-bottom-left-radius: 4px; }
        .user-msg { background: var(--main-color); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(255,183,183,0.3); }

        .footer { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 12px; }
        #user-input { flex: 1; border: none; background: #f5f5f5; padding: 15px 25px; border-radius: 30px; outline: none; font-size: 16px; }
        .send-btn { background: var(--main-color); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .send-btn:hover { opacity: 0.8; }
        
        #donation-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.97); display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; z-index: 100; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header" id="app-header">24h Partners</div>

    <div id="setup-screen" class="screen">
        <div class="setup-item">
            <label>あなたのニックネーム</label>
            <input type="text" id="user-name" placeholder="お名前を教えて？" maxlength="10">
        </div>
        <div class="gender-toggle">
            <button class="g-btn active" id="btn-f" onclick="window.toggleGender('f')">女性パートナー</button>
            <button class="g-btn" id="btn-m" onclick="window.toggleGender('m')">男性パートナー</button>
        </div>
        <div class="char-grid" id="char-grid"></div>
        <button onclick="window.startApp()" style="margin-top:30px; padding:20px; background:var(--main-color); color:white; border:none; border-radius:20px; font-weight:bold; cursor:pointer; font-size:1.2rem;">この人と会話を始める</button>
    </div>

    <div id="chat-screen" class="screen">
        <div id="portrait-area"><div class="visual-box" id="visual-emoji">🌸</div></div>
        <div id="chat-box"></div>
        <div id="donation-overlay">
            <h2 style="color:#ff4500;">大切なお話があるの…</h2>
            <p id="donation-text" style="line-height:1.7; color:#333;"></p>
            <a href="https://ofuse.me/o/YOUR_ID" target="_blank" style="background:#ff4500; color:white; text-decoration:none; padding:18px 40px; border-radius:40px; font-weight:bold; margin-top:30px; display:inline-block;">OFUSEで支援・募金する</a>
            <button onclick="location.reload()" style="margin-top:30px; background:none; border:none; color:#999; cursor:pointer; text-decoration:underline;">TOPへ戻る</button>
        </div>
        <div class="footer">
            <input type="text" id="user-input" placeholder="メッセージを送ってね">
            <button class="send-btn" onclick="window.handleSend()">送信</button>
        </div>
    </div>
</div>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // 確定APIキー
    const KEY = "AIzaSyCbj09jgeL0wx6DN9yixhOObvDyTHg76VA";

    const charData = {
        f: [
            { id:'f1', name:'ひまり', type:'癒やし', color:'#ffb7b7', emoji:'🌸', prompt:'可愛く甘やかす、癒やし系。語尾は「〜だよ」「〜だね」。', donation:'ユニセフ募金のお願いを可愛く。'},
            { id:'f2', name:'シズク', type:'お姉様', color:'#a2d2ff', emoji:'❄', prompt:'知的で落ち着いたお姉様。敬語。', donation:'寄付の案内を落ち着いて。'},
            { id:'f3', name:'あかり', type:'元気', color:'#ffcc00', emoji:'☀️', prompt:'活発な元気娘。太陽のような明るさ。', donation:'熱血に国境なき医師団の支援を。'},
            { id:'f4', name:'ルナ', type:'ツンデレ', color:'#e0e0e0', emoji:'🌙', prompt:'ツンデレ。最初はぶっきらぼうだが実は一途。', donation:'照れながら募金のお願い。'},
            { id:'f5', name:'サクラ', type:'母性', color:'#a5d6a7', emoji:'🌿', prompt:'包容力のあるお母さんキャラ。', donation:'優しく世界の子供たちのために。'}
        ],
        m: [
            { id:'m1', name:'カイト', type:'熱血', color:'#ff7043', emoji:'🔥', prompt:'熱い兄貴分。一人称は「俺」。', donation:'男らしく寄付を呼びかける。'},
            { id:'m2', name:'レイ', type:'クール', color:'#82ccdd', emoji:'💎', prompt:'冷静沈着。理性的でスマート。', donation:'論理的に支援の必要性を。'},
            { id:'m3', name:'ソウタ', type:'ワンコ', color:'#dce775', emoji:'🐾', prompt:'人懐っこい可愛い後輩系。', donation:'健気に募金をお願い。'},
            { id:'m4', name:'アキラ', type:'面白い', color:'#ba68c8', emoji:'🃏', prompt:'ムードメーカー。冗談が大好き。', donation:'明るく、でも真面目に寄付の話。'},
            { id:'m5', name:'ハルカ', type:'執事', color:'#90a4ae', emoji:'🍷', prompt:'丁寧で献身的な執事キャラ。', donation:'恭しく社会貢献の案内を。'}
        ]
    };

    let selectedChar, userName, chat, isDonationPhase = false;
    let currentGender = 'f';

    window.toggleGender = (g) => { currentGender = g; render(); };
    window.selectChar = (id) => {
        selectedChar = [...charData.f, ...charData.m].find(c => c.id === id);
        document.documentElement.style.setProperty('--main-color', selectedChar.color);
        render();
    };

    function render() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = charData[currentGender].map(c => `
            <div class="char-card ${selectedChar?.id === c.id ? 'selected' : ''}" onclick="window.selectChar('${c.id}')">
                <div class="img-placeholder" style="background:${c.color}">${c.emoji}</div>
                <h4>${c.name}</h4>
                <p>${c.type}</p>
            </div>
        `).join('');
    }

    window.startApp = async () => {
        userName = document.getElementById('user-name').value.trim() || "あなた";
        if (!selectedChar) return alert("パートナーを選んでね！");

        try {
            const genAI = new GoogleGenerativeAI(KEY);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            chat = model.startChat({
                history: [{ role: "user", parts: [{ text: `君は「${selectedChar.name}」という性格：${selectedChar.prompt}。相手の名前は${userName}。親密に短く返信して。返信の最後に必ず[HAPPY][SAD][ANGRY][NORMAL]のどれか1つを付けて。` }] }],
            });

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('app-header').innerText = selectedChar.name;
            document.getElementById('visual-emoji').innerText = selectedChar.emoji;

            handleSend("こんにちは！自己紹介して！");
        } catch (e) {
            alert("ごめんね、今ちょっと繋がりにくいみたい。キーを確認してみてね。");
        }
    };

    window.handleSend = async (forced) => {
        if (isDonationPhase) return;
        const input = document.getElementById('user-input');
        const text = forced || input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";

        try {
            const result = await chat.sendMessage(text);
            const res = result.response.text();
            
            // 感情で見た目を少し変える（簡易ビジュアル）
            if(res.includes('[HAPPY]')) document.getElementById('portrait-area').style.background = "#fff0f0";
            if(res.includes('[SAD]')) document.getElementById('portrait-area').style.background = "#f0f4ff";
            
            addMsg(res.replace(/\[.*?\]/g, ""), 'ai');

            // 寄付トリガー
            if (["ありがとう", "おやすみ", "バイバイ", "助かった"].some(k => text.includes(k))) {
                isDonationPhase = true;
                setTimeout(async () => {
                    const model = new GoogleGenerativeAI(KEY).getGenerativeModel({ model: "gemini-1.5-flash" });
                    const don = await model.generateContent(`${selectedChar.name}として、${selectedChar.donation} 24時間寄り添い放題になるOFUSE(300円)と、ユニセフ/国境なき医師団への募金を真剣に伝えて。`);
                    const donText = don.response.text();
                    addMsg(donText, 'ai');
                    setTimeout(() => {
                        document.getElementById('donation-text').innerText = donText;
                        document.getElementById('donation-overlay').style.display = 'flex';
                    }, 2000);
                }, 1500);
            }
        } catch (e) {
            addMsg(`（……沈黙している）`, 'ai');
            console.error("Error details:", e);
        }
    };

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div'); d.className = `msg ${s}-msg`; d.innerText = t;
        box.appendChild(d); box.scrollTop = box.scrollHeight;
    }

    render();
</script>
</body>
</html>
