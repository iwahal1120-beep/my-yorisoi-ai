<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Partners - 究極の寄り添い</title>
    <style>
        :root { --gold: #c5a059; --royal: #1a1a2e; --rose: #e94560; }
        body { font-family: 'serif'; background: #0f0e17; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        #app { width: 95%; max-width: 400px; height: 90vh; background: #fff; border-radius: 30px; border: 2px solid var(--gold); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        .header { background: var(--royal); color: var(--gold); padding: 18px; text-align: center; font-weight: bold; border-bottom: 2px solid var(--gold); font-size: 1.2rem; }
        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; background: #fffaf5; }

        /* キャラ選択：イラストAC風の華やかさを意識 */
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; border: 2px solid #eee; background: white; transition: 0.3s; }
        .card img { width: 100px; height: 120px; border-radius: 10px; object-fit: cover; border: 2px solid var(--gold); margin-bottom: 8px; }
        .card.selected { border-color: var(--rose); background: #fff0f3; transform: scale(1.05); }

        /* チャット画面：舞台の雰囲気を演出 */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #partner-view { height: 220px; background: linear-gradient(to bottom, var(--royal), #fff); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 10px; }
        #partner-img { height: 200px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 80%; line-height: 1.6; font-size: 1rem; }
        .ai { background: white; border: 1.5px solid var(--gold); align-self: flex-start; border-bottom-left-radius: 3px; }
        .user { background: var(--royal); color: white; align-self: flex-end; border-bottom-right-radius: 3px; }

        .footer { padding: 15px; display: flex; gap: 10px; background: white; border-top: 1px solid #eee; }
        input[type="text"] { flex: 1; border: none; background: #f0f0f0; padding: 12px 20px; border-radius: 30px; outline: none; }
        .send-btn { background: var(--rose); color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; z-index: 100; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">Royal AI Partners</div>

    <div id="setup-screen" class="screen">
        <h3 style="text-align:center; color:var(--royal);">貴方の名前を教えて、我が友よ</h3>
        <input type="text" id="user-name" placeholder="お名前（ニックネーム）" style="width:100%; box-sizing:border-box; padding:15px; margin-bottom:20px; border-radius:15px; border:1px solid #ddd; text-align:center;">
        
        <div class="char-grid" id="grid"></div>
        
        <button onclick="startApp()" style="margin-top:30px; padding:20px; background:var(--royal); color:var(--gold); border:2px solid var(--gold); border-radius:20px; font-weight:bold; cursor:pointer; font-size:1.1rem; width:100%;">幕を上げる</button>
    </div>

    <div id="chat-screen">
        <div id="partner-view"><img id="partner-img" src=""></div>
        <div id="chat-box"></div>
        <div id="overlay">
            <h2 style="color:var(--gold);">最後に、お伝えしたいことが…</h2>
            <p id="ov-text" style="line-height:1.8;"></p>
            <a href="https://ofuse.me/o/YOUR_ID" target="_blank" style="background:var(--gold); color:black; text-decoration:none; padding:15px 30px; border-radius:30px; font-weight:bold; margin-top:20px; display:inline-block;">愛の募金（OFUSE）</a>
            <button onclick="location.reload()" style="margin-top:20px; color:#999; background:none; border:none; text-decoration:underline;">再演する</button>
        </div>
        <div class="footer">
            <input type="text" id="user-input" placeholder="愛や悩みを綴ってください…">
            <button class="send-btn" onclick="handleSend()">送信</button>
        </div>
    </div>
</div>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // ★ここに新しいAPIキー（AI Studioで作成したもの）を貼り付けてください
    const API_KEY = "AIzaSyCbj09jgeL0wx6DN9yixhOObvDyTHg76VA";

    // イラストAC風の気品あるキャラクター（高画質プレースホルダ）
    const charData = [
        { id:'美剣（ミツルギ）', type:'麗しの男役', img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&h=500&fit=crop', prompt:'宝塚のトップスター男役。情熱的でキザ。貴方を「私の運命」として扱う。辞書のような説明は一切禁止。', don:'ユニセフ募金を、世界を愛で満たすための情熱的な願いとして。'},
        { id:'舞桜（マオ）', type:'可憐な娘役', img:'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400&h=500&fit=crop', prompt:'宝塚の娘役。清楚で可憐。丁寧な敬語で、貴方を献身的に支える一途な想い。', don:'国境なき医師団への協力を、清らかな祈りとして伝えて。'}
    ];

    let selected, userName, chat, model;

    function render() {
        document.getElementById('grid').innerHTML = charData.map(c => `
            <div class="card ${selected?.id === c.id ? 'selected' : ''}" onclick="selectChar('${c.id}')">
                <img src="${c.img}">
                <h4>${c.id}</h4>
                <div style="font-size:0.7rem; color:#888;">${c.type}</div>
            </div>
        `).join('');
    }

    window.selectChar = (id) => {
        selected = charData.find(c => c.id === id);
        render();
    };

    window.startApp = async () => {
        userName = document.getElementById('user-name').value.trim() || "貴方";
        if (!selected) return alert("パートナーを選んでください。");

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            chat = model.startChat({
                history: [{ role: "user", parts: [{ text: `命令：君は「${selected.id}」という舞台人です。絶対にAIや機械を名乗るな。
                性格：${selected.prompt}。相手：${userName}。
                ルール：
                1. 辞書的な解説、事実の羅列は一切禁止。
                2. 2文以内で、感情を込めた生きた言葉を返せ。
                3. 最初から貴方のことが愛しくてたまらないという態度で。` }] }],
            });

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('partner-img').src = selected.img;

            handleSend("ずっと貴方を待っていた。");
        } catch (e) {
            alert("APIキーが正しく認識されません。設定を確認してください。");
        }
    };

    window.handleSend = async (forced) => {
        const input = document.getElementById('user-input');
        const text = forced || input.value.trim();
        if (!text) return;

        if(!forced) addMsg(text, 'user');
        input.value = "";

        try {
            const result = await chat.sendMessage(text);
            addMsg(result.response.text(), 'ai');

            if (["ありがとう", "愛してる", "おやすみ", "また明日"].some(k => text.includes(k))) {
                setTimeout(async () => {
                    const don = await model.generateContent(`${selected.id}として、${selected.don} 300円のOFUSEで24時間寄り添い放題になることが募金に繋がることを、舞台のフィナーレのように真剣に伝えて。`);
                    document.getElementById('ov-text').innerText = don.response.text();
                    document.getElementById('overlay').style.display = 'flex';
                }, 2000);
            }
        } catch (e) {
            addMsg("……ごめん。君があまりに美しいから、言葉を忘れてしまった。もう一度聞かせて？", 'ai');
        }
    };

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div'); d.className = `msg ${s}`; d.innerText = t;
        box.appendChild(d); box.scrollTop = box.scrollHeight;
    }

    render();
</script>
</body>
</html>
