<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寄り添いAIパートナー - 募金プロジェクト</title>
    <style>
        :root { --main-color: #ffb7b7; }
        body { font-family: sans-serif; background: #fdf6f0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app-container { width: 95%; max-width: 450px; height: 90vh; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .header { background: var(--main-color); color: white; padding: 15px; font-weight: bold; text-align: center; }
        
        /* 選択画面 */
        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .gender-select { display: flex; gap: 10px; margin-bottom: 20px; }
        .g-btn { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; }
        .g-btn.active { border-color: var(--main-color); background: var(--main-color); color: white; }
        .char-card { border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .char-card.selected { background: #fff5f5; border-color: var(--main-color); }
        .char-card img { width: 50px; height: 50px; border-radius: 50%; background: #ddd; }

        /* チャット画面 */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; background: #fffafb; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 0.9rem; line-height: 1.4; }
        .ai-msg { background: #ffe4e6; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: var(--main-color); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .footer { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }

        /* 募金案内オーバーレイ */
        #donation-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 100; }
        .ofuse-btn { background: #ff4500; color: white; text-decoration: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header" id="top-title">パートナー選択</div>

    <div id="setup-screen" class="screen">
        <div class="gender-select">
            <button class="g-btn active" onclick="setGender('f')">女性キャラ</button>
            <button class="g-btn" onclick="setGender('m')">男性キャラ</button>
        </div>
        <div id="char-list"></div>
        <button onclick="startChat()" style="margin-top:20px; padding:15px; background:var(--main-color); color:white; border:none; border-radius:10px; font-weight:bold;">この人と話す</button>
    </div>

    <div id="chat-screen" class="screen" style="display:none; padding:0;">
        <div id="chat-box"></div>
        <div id="donation-overlay">
            <h2 style="color:#ff4500;">大切なお願い</h2>
            <p id="donation-text"></p>
            <p style="font-size:0.8rem; color:#666;">（収益はユニセフ・国境なき医師団へ寄付されます）</p>
            <a href="https://ofuse.me/o/YOUR_ID" target="_blank" class="ofuse-btn">OFUSEで応援・募金する</a>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:blue; cursor:pointer;">TOPに戻る</button>
        </div>
        <div class="footer">
            <input type="text" id="user-input" placeholder="なにか話してみて…">
            <button onclick="handleSend()" style="background:var(--main-color); color:white; border:none; padding:0 15px; border-radius:20px;">送信</button>
        </div>
    </div>
</div>

<script>
    const characters = {
        f: [
            { id: 'f1', name: 'ひまり', color: '#ffb7b7', intro: 'おかえり！今日もお疲れ様。頑張ったね！', reply: 'うんうん、その気持ちわかるよ。', donation: '最後に大切なお願い！このアプリの収益はユニセフ等に募金してるの。もしよかったらOFUSEから君の優しさを届けてくれないかな？' },
            { id: 'f2', name: 'シズク', color: '#a2d2ff', intro: 'お疲れ様。私に甘えていいのよ？', reply: '無理しないで。あなたが笑ってくれるのが一番だわ。', donation: '…最後にお願い。実は運営費を寄付に充てているの。あなたの善意をOFUSEで分けていただけないかしら？' }
        ],
        m: [
            { id: 'm1', name: 'カイト', color: '#ffcc00', intro: 'おう！待ってたぜ！今日は何があった？', reply: 'ハハハ！お前ならやれると思ってたぜ！', donation: 'おう！最後に聞いてくれ。収益は国境なき医師団へ送ってるんだ。お前のOFUSEが世界を救う力になる。頼むぜ！' },
            { id: 'm2', name: 'レイ', color: '#82ccdd', intro: 'お帰り。悩みがあるなら聞くよ。', reply: 'なるほど。一歩ずつ解決していこう。', donation: '…最後に僕の願いを聞いて。この活動は募金を目的としている。君のOFUSEが誰かの未来になるんだ。協力してくれるかい？' }
        ]
    };

    let currentGender = 'f';
    let selectedId = 'f1';
    let isDonationPhase = false;

    function setGender(g) {
        currentGender = g;
        document.querySelectorAll('.g-btn').forEach((b, i) => b.classList.toggle('active', (g === 'f' && i === 0) || (g === 'm' && i === 1)));
        selectedId = characters[g][0].id;
        renderList();
    }

    function renderList() {
        const list = document.getElementById('char-list');
        list.innerHTML = characters[currentGender].map(c => `
            <div class="char-card ${selectedId === c.id ? 'selected' : ''}" onclick="selectChar('${c.id}')">
                <img src="https://via.placeholder.com/50?text=${c.name[0]}" alt="">
                <div><strong>${c.name}</strong></div>
            </div>
        `).join('');
    }

    function selectChar(id) {
        selectedId = id;
        const char = [...characters.f, ...characters.m].find(c => c.id === id);
        document.documentElement.style.setProperty('--main-color', char.color);
        renderList();
    }

    function startChat() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        const char = [...characters.f, ...characters.m].find(c => c.id === selectedId);
        document.getElementById('top-title').innerText = char.name;
        addMsg(char.intro, 'ai');
    }

    const endKeywords = ["おやすみ", "またね", "ありがとう", "助かった", "お疲れ", "終わる", "バイバイ", "さよなら"];

    function handleSend() {
        if (isDonationPhase) return;
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";

        const char = [...characters.f, ...characters.m].find(c => c.id === selectedId);
        
        setTimeout(() => {
            addMsg(char.reply, 'ai');

            // 終わりの挨拶が含まれているかチェック
            if (endKeywords.some(k => text.includes(k))) {
                isDonationPhase = true;
                setTimeout(() => {
                    addMsg("あ、最後に一つだけ、大切なお願いがあるんだけど…いいかな？", "ai");
                    setTimeout(() => {
                        addMsg(char.donation, "ai");
                        setTimeout(() => {
                            document.getElementById('donation-text').innerText = char.donation;
                            document.getElementById('donation-overlay').style.display = 'flex';
                        }, 2000);
                    }, 1500);
                }, 1500);
            }
        }, 800);
    }

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${s}-msg`;
        d.innerText = t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    renderList();
</script>
</body>
</html>
