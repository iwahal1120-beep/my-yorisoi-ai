<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたのタイプで寄り添う！AIパートナー</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6f0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app-container { width: 95%; max-width: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #ffb7b7; color: white; padding: 15px; font-weight: bold; font-size: 1.2rem; }
        .char-section { padding: 20px; border-bottom: 1px solid #eee; }
        #character-image { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #ffb7b7; object-fit: cover; }
        #chat-box { height: 300px; overflow-y: auto; padding: 15px; background: #fffaf0; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; }
        .ai-msg { background: #ffe4e1; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #ffb7b7; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .limit-overlay { padding: 20px; background: rgba(255,255,255,0.9); text-align: center; display: none; }
        .ofuse-btn { background: #ff4500; color: white; text-decoration: none; padding: 10px 20px; border-radius: 20px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">寄り添いAIパートナー</div>
    
    <div class="char-section">
        <select id="char-select" onchange="changeCharacter()" style="width: 100%; padding: 8px; border-radius: 10px;">
            <option value="kawaii">可愛い系（癒やし担当）</option>
            <option value="kirei">綺麗系（お姉様担当）</option>
            <option value="futsu">普通系（友達担当）</option>
            <option value="omoshiro">面白い系（笑い担当）</option>
        </select>
        <br><br>
        <img id="character-image" src="https://via.placeholder.com/150?text=AI" alt="Character">
        <p id="char-intro">「今日もお疲れ様。ゆっくりお話ししよ？」</p>
    </div>

    <div id="chat-box">
        <div class="msg ai-msg">こんにちは！今日はどんな一日だった？</div>
    </div>
    
    <div id="limit-overlay" class="limit-overlay">
        <p>本日の無料会話制限に達しました。</p>
        <a href="https://ofuse.me/o/YOUR_ID" target="_blank" class="ofuse-btn">300円で制限解除 (OFUSE)</a>
    </div>

    <div class="input-area" id="input-area">
        <input type="text" id="user-input" placeholder="メッセージを送る...">
        <button onclick="sendMessage()">送信</button>
    </div>
</div>

<script>
    let messageCount = 0;
    const MAX_FREE = 5; // テスト用に5回で制限

    const charData = {
        kawaii: { intro: "えへへ、お帰りなさい！元気出るまでそばにいるよ？", color: "#ffb7b7" },
        kirei: { intro: "お疲れ様。たまには肩の力を抜いて、私に甘えていいのよ。", color: "#a2d2ff" },
        futsu: { intro: "おっ、お疲れ！今日あったこと、全部聞くよ。", color: "#b2e2f2" },
        omoshiro: { intro: "待ってたぜ！何か面白いことあったか？話してみろよ！", color: "#ffcc00" }
    };

    function changeCharacter() {
        const type = document.getElementById('char-select').value;
        const data = charData[type];
        document.getElementById('char-intro').innerText = data.intro;
        document.querySelector('.header').style.background = data.color;
        document.getElementById('character-image').style.borderColor = data.color;
    }

    function sendMessage() {
        if (messageCount >= MAX_FREE) {
            document.getElementById('limit-overlay').style.display = 'block';
            document.getElementById('input-area').style.display = 'none';
            return;
        }

        const input = document.getElementById('user-input');
        if (!input.value) return;

        const chatBox = document.getElementById('chat-box');
        
        // ユーザーのメッセージ
        chatBox.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
        
        // AIの返答（仮）
        setTimeout(() => {
            chatBox.innerHTML += `<div class="msg ai-msg">そっか、そんなことがあったんだね。あなたは本当によく頑張ってるよ！</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 600);

        input.value = "";
        messageCount++;
    }
</script>
</body>
</html>
