<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24hパートナー・10種の仲間たち</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fffdf5; text-align: center; padding: 20px; color: #444; }
        .container { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 500px; margin: auto; }
        .pet-display { font-size: 100px; margin: 15px 0; min-height: 120px; }
        select { font-size: 18px; padding: 8px; border-radius: 10px; width: 80%; margin-bottom: 10px; border: 2px solid #ffcc33; }
        textarea { width: 90%; height: 80px; padding: 15px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; margin: 15px 0; }
        button { background: #ffcc33; color: #554400; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:hover { background: #ffbb00; }
        #response { margin-top: 25px; padding: 20px; background: #fffef0; border-radius: 15px; line-height: 1.6; text-align: left; border-left: 5px solid #ffcc33; min-height: 60px; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🐾 24hパートナー (10種)</h2>
    <p>誰に話を聞いてもらう？</p>
    
    <select id="petSelect">
        <option value="🐶">イヌのポチ</option>
        <option value="🐱">ネコのタマ</option>
        <option value="🐰">ウサギのピョン</option>
        <option value="🐥">ヒヨコのピー</option>
        <option value="🐼">パンダのパンパン</option>
        <option value="🦊">キツネのコン</option>
        <option value="🐹">ハムスターのハム</option>
        <option value="🐻">クマのクマゴロウ</option>
        <option value="🦁">ライオンのレオ</option>
        <option value="🐧">ペンギンのペンペン</option>
    </select>

    <div class="pet-display" id="petIcon">🐶</div>
    
    <textarea id="userInput" placeholder="例：ちょっと疲れちゃったな..."></textarea>
    <br>
    <button onclick="listenToUser()">心を預ける</button>

    <div id="response">主さま、お話し聞かせて...🐾</div>
</div>

<script>
    // 10種類の鳴き声設定
    const petSounds = {
        "🐶": "ワン！ワン！", "🐱": "ニャ〜ン", "🐰": "（鼻をヒクヒク）", 
        "🐥": "ピヨピヨ！", "🐼": "（モグモグ）", "🦊": "コンコン！", 
        "🐹": "クピプ〜", "🐻": "ガォ〜ッ！", "🦁": "ガオーーーン！", "🐧": "パタパタ"
    };

    // 悩みキーワードへの「寄り添い」メッセージ
    const replies = {
        "疲れ": ["本当によく頑張ったね。ボクがずっと隣にいるから、ゆっくり休んで。", "お疲れさま。主さまの頑張りはボクが一番知ってるよ！", "無理しないで。今はボクに甘えていいんだよ。"],
        "悲しい": ["泣きたい時は泣いていいんだよ。ボクがギュッとしてあげる。", "主さまの悲しい気持ち、ボクが半分持ってあげる。一人じゃないよ。", "大丈夫。明日はきっと、主さまに笑顔が戻るよ。"],
        "不安": ["ボクがついてるよ。悪いものは全部ボクが追い払ってあげる！", "心配しないで。主さまなら、きっと乗り越えられるよ。信じてる。", "深く呼吸してみて。ボクの体温を感じて。大丈夫だよ。"],
        "楽しい": ["ボクもすっごく嬉しい！もっと聞かせて！", "最高だね！主さまが笑ってると、ボクも幸せなんだ。", "やったー！今日は記念日だね！一緒に喜ぼう！"],
        "通常": ["うんうん、聞いてるよ。主さまの話はいつも大切に思ってるよ。", "話してくれてありがとう。主さまの味方でいられて嬉しいな。", "どんな時でも、ボクはずーっと主さまのパートナーだよ。"]
    };

    function listenToUser() {
        const input = document.getElementById('userInput').value;
        const petIcon = document.getElementById('petSelect').value;
        const resDiv = document.getElementById('response');
        
        if (!input) { alert("何か一言、声をかけてみて！"); return; }

        let sound = petSounds[petIcon];
        let category = "通常";

        // キーワード判定（部分一致）
        if (input.includes("疲れ") || input.includes("しんどい")) category = "疲れ";
        else if (input.includes("悲しい") || input.includes("泣")) category = "悲しい";
        else if (input.includes("不安") || input.includes("怖い")) category = "不安";
        else if (input.includes("楽しい") || input.includes("嬉しい")) category = "楽しい";

        const list = replies[category];
        const msg = list[Math.floor(Math.random() * list.length)];

        resDiv.innerHTML = `<b style="color:#d4a017;">${sound}</b><br>${msg}`;
        document.getElementById('userInput').value = ""; // 入力欄をクリア
    }

    // アイコン切り替え
    document.getElementById('petSelect').addEventListener('change', (e) => {
        document.getElementById('petIcon').innerText = e.target.value;
    });
</script>

</body>
</html>
