<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // ... (キャラデータ部分はそのまま) ...

    // ページ読み込み時に保存されたキーがあれば読み込む
    window.onload = () => {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
        const savedName = localStorage.getItem('user_nickname');
        if (savedName) document.getElementById('user-name').value = savedName;
        renderChars();
    };

    window.startApp = async () => {
        apiKey = document.getElementById('api-key').value.trim();
        userName = document.getElementById('user-name').value.trim() || "あなた";
        
        if (!apiKey) return alert("APIキーを入力してください。");
        if (!selectedChar) return alert("パートナーを選んでね！");

        // キーと名前をブラウザに保存（次回から入力不要に）
        localStorage.setItem('gemini_api_key', apiKey);
        localStorage.setItem('user_nickname', userName);

        try {
            genAI = new GoogleGenerativeAI(apiKey);
            // 応答が速いflashモデルを使用
            model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            // AIへの「魂」の注入（システムプロンプト）
            chat = model.startChat({
                history: [{ 
                    role: "user", 
                    parts: [{ text: `命令：君は今から「${selectedChar.name}」として振る舞ってください。
                    性格設定：${selectedChar.prompt}
                    相手の名前：${userName}
                    ルール：
                    1. 親密で、相手の心に寄り添う言葉をかけて。
                    2. 返信は短めに（2〜3文程度）。
                    3. 文末に必ず現在の感情を [HAPPY], [SAD], [ANGRY], [NORMAL] のいずれか1つで表現して。` }] 
                }],
            });

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('app-header').innerText = selectedChar.name;
            setPortrait('normal');
            
            // 最初の挨拶をAIに生成させる
            handleSend("こんにちは！自己紹介して、僕/私を励まして！");

        } catch (e) {
            alert("APIキーが正しくないか、エラーが発生しました。");
        }
    };

    // ... (handleSend, addMsg, setPortrait 関数は前回のものを使用) ...
</script>
