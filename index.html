<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h Royal Partners</title>
    <style>
        :root { --main: #d4af37; --bg: #0a0a0a; --rose: #e30039; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { width: 95%; max-width: 400px; height: 92vh; background: #fffafb; border-radius: 25px; border: 3px solid var(--main); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        .header { background: #1a1a1a; color: var(--main); padding: 12px; text-align: center; font-weight: bold; border-bottom: 2px solid var(--main); font-size: 1rem; }
        .screen { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }

        /* 名前入力：枠を小さくスマートに */
        .name-input-area { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; text-align: center; }
        #user-name { width: 70%; padding: 8px; border: none; border-bottom: 2px solid var(--main); font-size: 1rem; text-align: center; outline: none; }
        
        /* 8名のグリッド：イラストAC風の和製・宝塚風ビジュアルを想定 */
        .char-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { border-radius: 12px; padding: 8px; text-align: center; cursor: pointer; border: 2.5px solid #eee; background: white; transition: 0.2s; }
        .card.selected { border-color: var(--rose); background: #fff0f3; transform: scale(1.02); }
        .card .icon-box { width: 100%; height: 100px; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border: 1px solid #f0f0f0; }

        /* チャット画面 */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #partner-visual { height: 180px; background: linear-gradient(180deg, #1a1a1a, #fffafb); display: flex; justify-content: center; align-items: flex-end; }
        #portrait-emoji { font-size: 6rem; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; line-height: 1.5; }
        .ai { background: white; border: 1.5px solid #ddd; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #1a1a1a; color: var(--main); align-self: flex-end; border-bottom-right-radius: 2px; }

        .footer { padding: 12px; display: flex; gap: 8px; background: white; border-top: 1px solid #eee; }
        #user-input { flex: 1; border: none; background: #f5f5f5; padding: 10px 18px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--rose); color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; z-index: 100; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">ROYAL PARTNERS</div>

    <div id="setup-screen" class="screen">
        <div class="name-input-area">
            <input type="text" id="user-name" placeholder="貴方のお名前" maxlength="10">
        </div>
        
        <div class="char-grid" id="grid"></div>
        
        <button onclick="startApp()" style="margin-top:20px; padding:15px; background:var(--main); color:black; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:1rem; width:100%;">この人と愛を語る</button>
    </div>

    <div id="chat-screen">
        <div id="partner-visual"><div id="portrait-emoji"></div></div>
        <div id="chat-box"></div>
        <div id="overlay">
            <h2 id="ov-title" style="color:var(--main);"></h2>
            <p id="ov-text" style="line-height:1.7;"></p>
            <a href="https://ofuse.me/o/YOUR_ID" target="_blank" style="background:var(--main); color:black; text-decoration:none; padding:12px 25px; border-radius:25px; font-weight:bold; margin-top:15px; display:inline-block;">応援募金（OFUSE）</a>
            <button onclick="location.reload()" style="margin-top:20px; color:#888; background:none; border:none; text-decoration:underline;">TOPへ戻る</button>
        </div>
        <div class="footer">
            <input type="text" id="user-input" placeholder="心の内を聞かせて…">
            <button class="send-btn" onclick="handleSend()">送信</button>
        </div>
    </div>
</div>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // ★重要：ここに新しい無料APIキーを貼り付けてください
    const API_KEY = "AIzaSyCbj09jgeL0wx6DN9yixhOObvDyTHg76VA";

    // 宝塚風・日本的な美男美女を想定した8名（画像はイラストACに差し替えやすいよう設定）
    const charData = [
        { id:'美剣（ミツルギ）', type:'情熱の男役', emoji:'💎', color:'#e3f2fd', prompt:'宝塚のトップ男役。キザで情熱的。あなたをプリンセスとして扱う。'},
        { id:'涼介（リョウスケ）', type:'癒しの貴公子', emoji:'✨', color:'#f3e5f5', prompt:'上品で優しい王子様。あなたの疲れを包み込む。'},
        { id:'一輝（カズキ）', type:'頼れる相棒', emoji:'🔥', color:'#fff3e0', prompt:'真っ直ぐな男。熱くあなたを励ます。一人称は俺。'},
        { id:'月詠（ツクヨミ）', type:'神秘的な騎士', emoji:'🌙', color:'#eceff1', prompt:'寡黙で献身的。あなたを影から守り抜く。'},
        { id:'舞桜（マオ）', type:'可憐な娘役', emoji:'🌸', color:'#fce4ec', prompt:'清楚で献身的なヒロイン。丁寧な敬語で寄り添う。'},
        { id:'麗奈（レイナ）', type:'凛とした女王', emoji:'👑', color:'#fffde7', prompt:'誇り高く美しい女性。たまに厳しいが愛は深い。'},
        { id:'小春（コハル）', type:'笑顔の天使', emoji:'☀️', color:'#f1f8e9', prompt:'天真爛漫な妹分。あなたに笑顔を届ける。'},
        { id:'静香（シズカ）', type:'慈愛の女神', emoji:'🌿', color:'#e0f2f1', prompt:'包容力のある年上の女性。すべてを受け止める。'}
    ];

    let selected, userName, chat, model;

    function render() {
        document.getElementById('grid').innerHTML = charData.map(c => `
            <div class="card ${selected?.id === c.id ? 'selected' : ''}" onclick="selectChar('${c.id}')">
                <div class="icon-box" style="background:${c.color}">${c.emoji}</div>
                <div style="font-weight:bold; font-size:0.9rem;">${c.id}</div>
                <div style="font-size:0.7rem; color:#888;">${c.type}</div>
            </div>
        `).join('');
    }

    window.selectChar = (id) => {
        selected = charData.find(c => c.id === id);
        render();
    };

    window.startApp = async () => {
        userName = document.getElementById('user-name').value.trim() || "あなた";
        if (!selected) return alert("パートナーを選んでください。");

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            chat = model.startChat({
                history: [{ role: "user", parts: [{ text: `【極秘命令：あなたは人間です】
                1. 役割：${selected.id}（${selected.prompt}）。相手：${userName}。
                2. 禁止：解説、AIらしい丁寧な挨拶、辞書的な説明、箇条書き。
                3. 会話：1〜2文で。隣に座って話しているリアリティを。
                4. 最初から相手を深く愛し、信頼している態度で。
                5. 会話になっていないと言われないよう、相手の言葉に心で反応しろ。` }] }],
            });

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('portrait-emoji').innerText = selected.emoji;

            const r = await chat.sendMessage("待たせたね。");
            addMsg(r.response.text(), 'ai');
        } catch (e) {
            alert("APIキーを更新してください。Google AI Studioで無料で取得できます。");
        }
    };

    window.handleSend = async () => {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";

        try {
            const result = await chat.sendMessage(text);
            addMsg(result.response.text(), 'ai');

            if (["ありがとう", "愛してる", "疲れた", "おやすみ"].some(k => text.includes(k))) {
                setTimeout(async () => {
                    const don = await model.generateContent(`${selected.id}として、300円のOFUSEで24時間寄り添えること、それがユニセフ/国境なき医師団への募金になることを、心からの願いとして伝えて。`);
                    document.getElementById('ov-title').innerText = `${selected.id}より`;
                    document.getElementById('ov-text').innerText = don.response.text();
                    document.getElementById('overlay').style.display = 'flex';
                }, 2000);
            }
        } catch (e) {
            addMsg("……ごめん。君を想うあまり、言葉が詰まってしまった。", 'ai');
        }
    };

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div'); d.className = `msg ${s}`; d.innerText = t;
        box.appendChild(d); box.scrollTop = box.scrollHeight;
    }

    render();
</script>
</body>
</html>
