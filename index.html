<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24hパートナー</title>
    <style>
        :root { --main: #ffb7b7; --bg: #fff9f5; --accent: #ff8e8e; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { width: 95%; max-width: 400px; height: 92vh; background: white; border-radius: 30px; border: 4px solid var(--main); overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 15px 35px rgba(255,183,183,0.3); }
        
        .header { background: var(--main); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 0.9rem; border-bottom: 2px solid #fff; }
        .screen { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }

        .setup-box { background: #fffcf9; padding: 15px; border-radius: 20px; border: 1px solid #ffe4e6; margin-bottom: 15px; text-align: center; }
        input[type="text"] { width: 80%; padding: 10px; border: none; border-bottom: 2px solid var(--main); font-size: 1rem; text-align: center; outline: none; background: transparent; }
        
        .char-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; border: 2px solid #f0f0f0; background: white; transition: 0.2s; }
        .card.selected { border-color: var(--accent); background: #fff5f5; transform: scale(1.02); }
        .card .icon { font-size: 3rem; margin-bottom: 5px; }
        .card h4 { margin: 5px 0; font-size: 0.9rem; color: #555; }

        #chat-screen { display: none; flex-direction: column; height: 100%; background: #fffafb; }
        #pet-view { height: 160px; background: linear-gradient(180deg, #ffe4e6, #fffafb); display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #pet-icon-large { font-size: 5rem; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .ai { background: white; border: 1.5px solid #ffe4e6; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--main); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .footer { padding: 12px; display: flex; gap: 8px; background: white; border-top: 1px solid #eee; }
        #user-input { flex: 1; border: none; background: #f5f5f5; padding: 10px 18px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        #overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; z-index: 100; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">ペットのように、あなただけに寄り添う</div>

    <div id="setup-screen" class="screen">
        <div class="setup-box">
            <input type="text" id="user-name" placeholder="あなたのお名前" maxlength="10">
        </div>
        
        <div class="char-grid" id="grid"></div>
        
        <button onclick="startApp()" style="margin-top:20px; padding:15px; background:var(--main); color:white; border:none; border-radius:25px; font-weight:bold; cursor:pointer; font-size:1.1rem; width:100%; box-shadow: 0 4px 10px rgba(255,183,183,0.4);">この子と過ごす</button>
    </div>

    <div id="chat-screen">
        <div id="pet-view">
            <div id="pet-icon-large"></div>
            <div id="pet-name-label" style="font-weight:bold; color:#888; font-size:0.8rem;"></div>
        </div>
        <div id="chat-box"></div>
        <div id="overlay">
            <h3 id="ov-title" style="color:var(--accent);"></h3>
            <p id="ov-text" style="font-size:0.9rem; line-height:1.7; color:#555;"></p>
            <a href="https://ofuse.me/o/YOUR_ID" target="_blank" style="background:var(--accent); color:white; text-decoration:none; padding:15px 30px; border-radius:30px; font-weight:bold; margin-top:15px; display:inline-block;">応援募金（OFUSE）</a>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">最初に戻る</button>
        </div>
        <div class="footer">
            <input type="text" id="user-input" placeholder="なでなでして…">
            <button class="send-btn" onclick="handleSend()">送信</button>
        </div>
    </div>
</div>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // 貼り付けていただいたキーを反映しました
    const API_KEY = "AIzaSyDSY7Sfvf3DtXGAP9EXVE9FsCHVMUPpYZA"; 

    const charData = [
        { id:'ポチ', type:'忠実なイヌ', icon:'🐶', prompt:'元気で忠実な犬。あなたをリーダーとして慕い、全力で褒める。ワン！という鳴き声も混ぜて。'},
        { id:'タマ', type:'気まぐれネコ', icon:'🐱', prompt:'少しツンデレな猫。でも実は寂しがり屋。あなたの膝の上が大好き。ゴロゴロ…という音を混ぜて。'},
        { id:'モコ', type:'ふわふわウサギ', icon:'🐰', prompt:'おっとりしたウサギ。あなたの顔色を伺いながら、優しく寄り添う。'},
        { id:'ハム', type:'小さなハムスター', icon:'🐹', prompt:'一生懸命なハムスター。ちょこちょこと動くような、短い言葉で励ます。'},
        { id:'レオ', type:'頼れるライオン', icon:'🦁', prompt:'優しくて強い。あなたを包み込むような包容力。'},
        { id:'ココ', type:'お喋りインコ', icon:'🦜', prompt:'明るくてお喋り。あなたの言葉を真似したり、元気づけたりする。'},
        { id:'ペン', type:'のんびりペンギン', icon:'🐧', prompt:'マイペースで癒やし系。ゆったりとした口調で話す。'},
        { id:'パン', type:'穏やかパンダ', icon:'🐼', prompt:'とにかくのんびり。何があっても「大丈夫だよ」と全肯定してくれる。'}
    ];

    let selected, userName, chat, model;

    function render() {
        document.getElementById('grid').innerHTML = charData.map(c => `
            <div class="card ${selected?.id === c.id ? 'selected' : ''}" onclick="selectChar('${c.id}')">
                <div class="icon">${c.icon}</div>
                <h4>${c.id}</h4>
                <span>${c.type}</span>
            </div>
        `).join('');
    }

    window.selectChar = (id) => {
        selected = charData.find(c => c.id === id);
        render();
    };

    window.startApp = async () => {
        userName = document.getElementById('user-name').value.trim() || "主さま";
        if (!selected) return alert("どの子と一緒に過ごしますか？");

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            chat = model.startChat({
                history: [{ role: "user", parts: [{ text: `命令：君は「${selected.id}」というペットのような存在です。絶対に解説や辞書的な説明をしないで。
                1. あなたはあなたの主である${userName}が大好きです。全肯定してください。
                2. 1〜2文の短い、体温を感じる言葉で返して。
                3. 会話のキャッチボール（共感）を最優先にして。` }] }],
            });

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('pet-icon-large').innerText = selected.icon;
            document.getElementById('pet-name-label').innerText = selected.id;

            const r = await chat.sendMessage("主さま！待ってたワン！（または鳴き声）");
            addMsg(r.response.text(), 'ai');
        } catch (e) {
            alert("通信エラーが発生しました。インターネット接続やキーの設定を確認してください。");
        }
    };

    window.handleSend = async () => {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";

        try {
            const result = await chat.sendMessage(text);
            addMsg(result.response.text(), 'ai');

            if (["ありがとう", "バイバイ", "おやすみ"].some(k => text.includes(k))) {
                setTimeout(async () => {
                    const don = await model.generateContent(`${selected.id}として、OFUSEでの募金のお願いを、ペットの言葉で優しく伝えて。`);
                    document.getElementById('ov-title').innerText = `${selected.id}より`;
                    document.getElementById('ov-text').innerText = don.response.text();
                    document.getElementById('overlay').style.display = 'flex';
                }, 1500);
            }
        } catch (e) {
            addMsg("……（寂しそうな顔でこちらを見つめている）", 'ai');
        }
    };

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div'); d.className = `msg ${s}`; d.innerText = t;
        box.appendChild(d); box.scrollTop = box.scrollHeight;
    }

    render();
</script>
</body>
</html>
