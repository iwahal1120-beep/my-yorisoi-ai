<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h寄り添いAIパートナー</title>
    <style>
        :root { --main-color: #ffb7b7; --bg-color: #fdf6f0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #app-container { width: 95%; max-width: 450px; height: 90vh; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .header { background: var(--main-color); color: white; padding: 15px; font-weight: bold; text-align: center; z-index: 10; }
        
        /* 設定画面 */
        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .setup-item { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; font-weight: bold; color: #666; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; }
        .gender-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .g-btn { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid #eee; background: white; cursor: pointer; font-weight: bold; }
        .g-btn.active { background: var(--main-color); color: white; border-color: var(--main-color); }
        
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .char-card { border: 2px solid #eee; border-radius: 12px; padding: 8px; text-align: center; cursor: pointer; background: white; transition: 0.2s; }
        .char-card img { width: 50px; height: 50px; border-radius: 50%; background: #eee; margin-bottom: 5px; object-fit: cover; }
        .char-card.selected { border-color: var(--main-color); background: #fff5f5; transform: scale(1.02); }
        .char-card h4 { margin: 2px 0; font-size: 0.8rem; }

        /* チャット画面 */
        #chat-screen { display: none; flex-direction: column; height: 100%; padding: 0; }
        #portrait-area { height: 180px; display: flex; justify-content: center; align-items: center; background: #fffafb; border-bottom: 1px solid #eee; }
        #char-portrait { height: 90%; object-fit: contain; transition: 0.3s; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fffafb; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .ai-msg { background: #ffe4e6; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: var(--main-color); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* 募金案内 */
        #donation-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; z-index: 100; }
        .ofuse-btn { background: #ff4500; color: white; text-decoration: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 10px rgba(255,69,0,0.3); }

        .footer { padding: 12px; border-top: 1px solid #eee; display: flex; gap: 8px; background: white; }
        .footer input { flex: 1; border: none; background: #f0f0f0; padding: 10px 15px; border-radius: 20px; outline: none; }
        .send-btn { background: var(--main-color); color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header" id="app-header">パートナー設定</div>

    <div id="setup-screen" class="screen">
        <div class="setup-item">
            <label>APIキー（一度入力すると保存されます）</label>
            <input type="text" id="api-key" placeholder="AIzaSy...">
        </div>
        <div class="setup-item">
            <label>あなたのニックネーム</label>
            <input type="text" id="user-name" placeholder="たろう" maxlength="10">
        </div>
        <div class="gender-toggle">
            <button class="g-btn active" id="btn-f" onclick="toggleGender('f')">女性（5名）</button>
            <button class="g-btn" id="btn-m" onclick="toggleGender('m')">男性（5名）</button>
        </div>
        <div class="char-grid" id="char-grid"></div>
        <button onclick="startApp()" style="margin-top:20px; padding:15px; background:var(--main-color); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">会話を始める</button>
    </div>

    <div id="chat-screen" class="screen">
        <div id="portrait-area"><img id="char-portrait" src=""></div>
        <div id="chat-box"></div>
        <div id="donation-overlay">
            <h2 style="color:#ff4500;">大切なお願い</h2>
            <p id="donation-text" style="font-size:0.9rem; color:#444; margin-bottom:10px;"></p>
            <p style="font-size:0.75rem; color:#888;">（※収益はユニセフや国境なき医師団へ募金されます）</p>
            <a href="https://ofuse.me/o/YOUR_ID" target="_blank" class="ofuse-btn">OFUSEで募金・応援する</a>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:blue; cursor:pointer; text-decoration:underline;">TOPに戻る</button>
        </div>
        <div class="footer">
            <input type="text" id="user-input" placeholder="メッセージを入力...">
            <button class="send-btn" onclick="handleSend()">送信</button>
        </div>
    </div>
</div>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const P = "https://via.placeholder.com/300x400";
    const charData = {
        f: [
            { id:'f1', name:'ひまり', type:'癒やし', color:'#ffb7b7', imgs:{normal:`${P}/ffb7b7?text=Himari`, happy:`${P}/ffcccc?text=Himari_Joy`, sad:`${P}/ffe4e6?text=Himari_Sad`, angry:`${P}/ff8888?text=Himari_Ser`}, prompt:'可愛く甘やかす、癒やし系。語尾は「〜だよ」「〜だね」。', donation:'ユニセフ募金のお願いを可愛く。'},
            { id:'f2', name:'シズク', type:'お姉様', color:'#a2d2ff', imgs:{normal:`${P}/a2d2ff?text=Shizuku`, happy:`${P}/e0f7fa?text=Shizuku_Joy`, sad:`${P}/b3e5fc?text=Shizuku_Sad`, angry:`${P}/4fc3f7?text=Shizuku_Ser`}, prompt:'知的で落ち着いたお姉様。敬語。', donation:'大人の余裕で寄付の案内。'},
            { id:'f3', name:'あかり', type:'元気', color:'#ffcc00', imgs:{normal:`${P}/ffcc00?text=Akari`, happy:`${P}/fff9c4?text=Akari_Joy`, sad:`${P}/fff176?text=Akari_Sad`, angry:`${P}/fbc02d?text=Akari_Ser`}, prompt:'活発な妹分。元気いっぱい。', donation:'熱血に国境なき医師団への協力を。'},
            { id:'f4', name:'ルナ', type:'ツンデレ', color:'#e0e0e0', imgs:{normal:`${P}/e0e0e0?text=Luna`, happy:`${P}/f5f5f5?text=Luna_Joy`, sad:`${P}/eeeeee?text=Luna_Sad`, angry:`${P}/bdbdbd?text=Luna_Ser`}, prompt:'ツンデレ。最初は冷たいが実は優しい。', donation:'照れながら寄付のお願い。'},
            { id:'f5', name:'サクラ', type:'母性', color:'#a5d6a7', imgs:{normal:`${P}/a5d6a7?text=Sakura`, happy:`${P}/e8f5e9?text=Sakura_Joy`, sad:`${P}/c8e6c9?text=Sakura_Sad`, angry:`${P}/81c784?text=Sakura_Ser`}, prompt:'包容力のあるお母さん的性格。', donation:'優しく世界の子供たちのための募金を。'}
        ],
        m: [
            { id:'m1', name:'カイト', type:'熱血', color:'#ff7043', imgs:{normal:`${P}/ff7043?text=Kaito`, happy:`${P}/ffab91?text=Kaito_Joy`, sad:`${P}/ff8a65?text=Kaito_Sad`, angry:`${P}/e64a19?text=Kaito_Ser`}, prompt:'熱い兄貴分。一人称は俺。', donation:'国境なき医師団への熱い支援を。'},
            { id:'m2', name:'レイ', type:'クール', color:'#82ccdd', imgs:{normal:`${P}/82ccdd?text=Rei`, happy:`${P}/b2ebf2?text=Rei_Joy`, sad:`${P}/e0f7fa?text=Rei_Sad`, angry:`${P}/4dd0e1?text=Rei_Ser`}, prompt:'冷静沈着。論理的なアドバイス。', donation:'論理的に寄付の必要性を説く。'},
            { id:'m3', name:'ソウタ', type:'ワンコ', color:'#dce775', imgs:{normal:`${P}/dce775?text=Sota`, happy:`${P}/f0f4c3?text=Sota_Joy`, sad:`${P}/e6ee9c?text=Sota_Sad`, angry:`${P}/c0ca33?text=Sota_Ser`}, prompt:'懐っこい後輩。可愛い。', donation:'健気に募金のお願い。'},
            { id:'m4', name:'アキラ', type:'面白い', color:'#ba68c8', imgs:{normal:`${P}/ba68c8?text=Akira`, happy:`${P}/e1bee7?text=Akira_Joy`, sad:`${P}/ce93d8?text=Akira_Sad`, angry:`${P}/8e24aa?text=Akira_Ser`}, prompt:'ムードメーカー。冗談多め。', donation:'明るく、でも真面目に寄付の話。'},
            { id:'m5', name:'ハルカ', type:'執事', color:'#90a4ae', imgs:{normal:`${P}/90a4ae?text=Haruka`, happy:`${P}/cfd8dc?text=Haruka_Joy`, sad:`${P}/b0bec5?text=Haruka_Sad`, angry:`${P}/546e7a?text=Haruka_Ser`}, prompt:'丁寧な執事。献身的。', donation:'恭しく社会貢献の案内。'}
        ]
    };

    let selectedChar, userName, apiKey, genAI, model, chat, isDonationPhase = false;
    let currentGender = 'f';

    window.onload = () => {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
        const savedName = localStorage.getItem('user_nickname');
        if (savedName) document.getElementById('user-name').value = savedName;
        renderChars();
    };

    window.toggleGender = (g) => { currentGender = g; renderChars(); };
    window.selectChar = (id) => { 
        selectedChar = [...charData.f, ...charData.m].find(c => c.id === id);
        document.documentElement.style.setProperty('--main-color', selectedChar.color);
        renderChars();
    };

    function renderChars() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = charData[currentGender].map(c => `
            <div class="char-card ${selectedChar?.id === c.id ? 'selected' : ''}" onclick="selectChar('${c.id}')">
                <img src="${c.imgs.normal}" alt="">
                <h4>${c.name}</h4>
                <p>${c.type}</p>
            </div>
        `).join('');
    }

    window.startApp = async () => {
        apiKey = document.getElementById('api-key').value.trim();
        userName = document.getElementById('user-name').value.trim() || "あなた";
        if (!apiKey || !selectedChar) return alert("APIキーとキャラを選んでね！");

        localStorage.setItem('gemini_api_key', apiKey);
        localStorage.setItem('user_nickname', userName);

        try {
            genAI = new GoogleGenerativeAI(apiKey);
            model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            chat = model.startChat({
                history: [{ role: "user", parts: [{ text: `命令：君は「${selectedChar.name}」という性格：${selectedChar.prompt}。相手の名前は${userName}。親しみやすく短めに返信して。返信の最後に必ず[HAPPY][SAD][ANGRY][NORMAL]のどれか1つを付けて。` }] }],
            });

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('app-header').innerText = selectedChar.name;
            setPortrait('normal');
            handleSend("こんにちは！自己紹介して、僕を元気づけて！");
        } catch (e) { alert("エラーが発生しました。キーを確認してね。"); }
    };

    window.handleSend = async (forcedText) => {
        if (isDonationPhase) return;
        const input = document.getElementById('user-input');
        const text = forcedText || input.value.trim();
        if (!text) return;
        addMsg(text, 'user');
        input.value = "";

        try {
            const result = await chat.sendMessage(text);
            const responseText = result.response.text();
            
            let emo = 'normal';
            if(responseText.includes('[HAPPY]')) emo = 'happy';
            else if(responseText.includes('[SAD]')) emo = 'sad';
            else if(responseText.includes('[ANGRY]')) emo = 'angry';
            setPortrait(emo);

            addMsg(responseText.replace(/\[.*?\]/g, ""), 'ai');

            if (["おやすみ", "ありがとう", "助かった", "また明日"].some(k => text.includes(k))) {
                isDonationPhase = true;
                setTimeout(async () => {
                    setPortrait('angry');
                    const donResult = await model.generateContent(`君は${selectedChar.name}。${selectedChar.donation} 24時間寄り添い放題になるOFUSE(300円)と、ユニセフ/国境なき医師団への募金を優しく、でも真剣にお願いして。`);
                    const donText = donResult.response.text();
                    addMsg(donText, 'ai');
                    setTimeout(() => {
                        document.getElementById('donation-text').innerText = donText;
                        document.getElementById('donation-overlay').style.display = 'flex';
                    }, 3000);
                }, 1500);
            }
        } catch (e) { addMsg("（AIが少し疲れちゃったみたい。時間を置いてみてね）", 'ai'); }
    };

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div'); d.className = `msg ${s}-msg`; d.innerText = t;
        box.appendChild(d); box.scrollTop = box.scrollHeight;
    }

    function setPortrait(emo) { document.getElementById('char-portrait').src = selectedChar.imgs[emo]; }

    // 公開設定用にグローバルに配置
    window.toggleGender = toggleGender;
    window.selectChar = selectChar;
    window.startApp = startApp;
    window.handleSend = handleSend;
</script>
</body>
</html>
