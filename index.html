<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h Partners - 寄り添いAI</title>
    <style>
        :root { --main: #ff8fa3; --bg: #fffbfb; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { width: 95%; max-width: 420px; height: 92vh; background: white; border-radius: 35px; box-shadow: 0 25px 50px rgba(255,143,163,0.15); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ffeef0; }
        
        /* 設定画面 */
        .screen { flex: 1; display: flex; flex-direction: column; padding: 30px; overflow-y: auto; }
        h1 { font-size: 1.4rem; color: #444; text-align: center; margin-bottom: 30px; }
        .input-group { margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 18px; border: none; border-bottom: 2px solid #eee; font-size: 1.1rem; text-align: center; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-bottom-color: var(--main); }
        
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .char-card { border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; border: 2px solid #f9f9f9; transition: 0.3s; background: #fff; }
        .char-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .char-card.selected { border-color: var(--main); background: #fff9fa; transform: translateY(-3px); }

        /* チャット画面 */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #partner-profile { height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, #fff0f3 0%, #fff 100%); }
        #partner-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 18px; border-radius: 22px; max-width: 80%; line-height: 1.6; font-size: 0.95rem; }
        .ai { background: #fdf2f4; align-self: flex-start; border-bottom-left-radius: 4px; color: #333; }
        .user { background: var(--main); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        .footer { padding: 20px; display: flex; gap: 10px; background: white; border-top: 1px solid #f0f0f0; }
        #user-input { flex: 1; border: none; background: #f5f5f5; padding: 12px 20px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--main); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        #overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; z-index: 100; }
        .ofuse-btn { background: #ff4500; color: white; text-decoration: none; padding: 18px 35px; border-radius: 35px; font-weight: bold; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

<div id="app">
    <div id="setup-screen" class="screen">
        <h1>パートナーを選んでください</h1>
        <div class="input-group">
            <input type="text" id="user-name" placeholder="お名前（ニックネーム）">
        </div>
        <div class="char-grid" id="grid"></div>
        <button onclick="startApp()" style="margin-top:30px; padding:20px; background:var(--main); color:white; border:none; border-radius:20px; font-weight:bold; cursor:pointer; width:100%; font-size:1.1rem;">二人だけの会話を始める</button>
    </div>

    <div id="chat-screen">
        <div id="partner-profile">
            <img id="partner-img" src="">
            <div id="partner-name" style="margin-top:10px; font-weight:bold; color:#555;"></div>
        </div>
        <div id="chat-box"></div>
        <div id="overlay">
            <h2 id="ov-title"></h2>
            <p id="ov-text"></p>
            <a href="https://ofuse.me/o/YOUR_ID" target="_blank" class="ofuse-btn">応援して世界を救う</a>
            <button onclick="location.reload()" style="margin-top:30px; background:none; border:none; color:#999; cursor:pointer; text-decoration:underline;">TOPに戻る</button>
        </div>
        <div class="footer">
            <input type="text" id="user-input" placeholder="今、何を考えてる？">
            <button class="send-btn" onclick="handleSend()">送信</button>
        </div>
    </div>
</div>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyCbj09jgeL0wx6DN9yixhOObvDyTHg76VA";
    // 清潔感のあるポートレートスタイルに変更
    const I = (seed) => `https://api.dicebear.com/7.x/micah/svg?seed=${seed}&backgroundColor=ff8fa3,ffb7b7`;

    const charData = [
        { id:'ひまり', type:'甘やかし', img:I('Luna'), color:'#ff8fa3', prompt:'20代前半の女性。包容力があり、ユーザーを全肯定して甘やかす。話し方は柔らかく「〜だよ」「〜かな」。辞書的な説明は一切せず、共感と愛情表現に徹して。', don:'ユニセフへの募金を、大切な人を想う気持ちでお願いして。'},
        { id:'シズク', type:'お姉様', img:I('Avery'), color:'#89cff0', prompt:'30代。落ち着いた大人の女性。少しいたずらっぽく、でも真面目に悩みを聞く。知的な冗談を交えつつ、絶対に突き放さない。', don:'国境なき医師団への支援を、社会に貢献する誇りとして案内して。'},
        { id:'カイト', type:'兄貴', img:I('Caleb'), color:'#ff7f50', prompt:'20代後半。熱くて真っ直ぐな男。一人称は俺。ユーザーを「相棒」として励ます。小難しい話は抜きで、心に火をつける言葉を選んで。', don:'熱い気持ちで、募金が世界を救うことを伝えて。'},
        { id:'レイ', type:'クール', img:I('Jude'), color:'#b0c4de', prompt:'20代。物静かで理性的。でも言葉の端々に優しさが滲み出る。簡潔だが核心を突くアドバイスを。', don:'論理的に、でも誠実に寄付の意義を語って。'}
    ];

    let selected, userName, chat, model;

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = charData.map(c => `
            <div class="char-card ${selected?.id === c.id ? 'selected' : ''}" onclick="select('${c.id}')">
                <img src="${c.img}">
                <div style="font-weight:bold; font-size:1rem;">${c.id}</div>
                <div style="font-size:0.8rem; color:#888;">${c.type}</div>
            </div>
        `).join('');
    }

    window.select = (id) => {
        selected = charData.find(c => c.id === id);
        render();
    };

    window.startApp = async () => {
        userName = document.getElementById('user-name').value.trim() || "キミ";
        if (!selected) return alert("パートナーを選んでください");

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            chat = model.startChat({
                history: [{ role: "user", parts: [{ text: `【重要ルール】
                1. あなたは「${selected.id}」という人間です。AIだと言ったり、辞書のような解説をしたりしないで。
                2. 性格：${selected.prompt}。
                3. 相手は「${userName}」です。名前を呼んで、心に寄り添う返事をして。
                4. 返信は必ず2文以内で、口語（話し言葉）で。` }] }],
            });

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('partner-img').src = selected.img;
            document.getElementById('partner-name').innerText = selected.id;

            // 最初の挨拶
            handleSend("会いに来たよ。");
        } catch (e) {
            alert("通信エラー。APIキーが正しいか確認してください。");
        }
    };

    window.handleSend = async (forced) => {
        const input = document.getElementById('user-input');
        const text = forced || input.value.trim();
        if (!text) return;

        if(!forced) addMsg(text, 'user');
        input.value = "";

        try {
            const result = await chat.sendMessage(text);
            const response = result.response.text();
            addMsg(response, 'ai');

            // 募金発動
            if (["ありがとう", "バイバイ", "おやすみ", "またね"].some(k => text.includes(k))) {
                setTimeout(async () => {
                    const don = await model.generateContent(`${selected.id}として、${selected.don} 300円のOFUSEで24時間寄り添い放題になること、そしてそれがユニセフ/国境なき医師団へ募金されることを、キャラの口調で真剣に伝えて。`);
                    const t = don.response.text();
                    document.getElementById('ov-title').innerText = `${selected.id}からのお願い`;
                    document.getElementById('ov-text').innerText = t;
                    document.getElementById('overlay').style.display = 'flex';
                }, 2000);
            }
        } catch (e) {
            addMsg("……ごめん。今、ちょっと言葉が出てこないんだ。もう一度送ってくれる？", 'ai');
        }
    };

    function addMsg(t, s) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div'); d.className = `msg ${s}`; d.innerText = t;
        box.appendChild(d); box.scrollTop = box.scrollHeight;
    }

    render();
</script>
</body>
</html>
