<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24hパートナー・お部屋</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fffdf5; margin: 0; padding: 10px; color: #444; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .container { background: white; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 500px; width: 100%; margin: auto; display: flex; flex-direction: column; height: 100%; overflow: hidden; position: relative; }
        
        /* ヘッダー */
        .header { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; padding-left: 15px; padding-right: 15px; }
        .header h2 { margin: 0; color: #ff7e5f; font-size: 1.1em; }
        .change-btn { background: #fff3cd; border: 1px solid #ffcc33; border-radius: 15px; padding: 6px 12px; font-size: 0.85em; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* パートナー選択ポップアップ */
        #petModal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 20px; padding: 20px; width: 85%; max-width: 350px; }
        .pet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .pet-item { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 10px 0; cursor: pointer; text-align: center; }
        .pet-item .icon { font-size: 30px; display: block; }
        .pet-item .name { font-size: 0.7em; font-weight: bold; color: #777; }

        /* チャット履歴エリア */
        #chat-log { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 20px; }
        
        /* 吹き出し（常に「現在の相棒」を表示） */
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; line-height: 1.6; font-size: 0.95em; position: relative; }
        .msg.user { align-self: flex-end; background: #ff7e5f; color: white; border-bottom-right-radius: 2px; }
        .msg.pet { align-self: flex-start; background: white; color: #444; border: 1px solid #eee; border-bottom-left-radius: 2px; margin-top: 10px; }
        
        /* 吹き出しの右上のアイコン：クラス名で制御して一括置換できるようにする */
        .pet-avatar-frame { position: absolute; top: -12px; right: -12px; font-size: 22px; background: white; border-radius: 50%; padding: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .pet-sound-label { font-weight: bold; color: #d4a017; font-size: 0.85em; display: block; margin-bottom: 4px; }

        /* 入力エリア */
        .input-area { padding: 12px; background: white; border-top: 1px solid #eee; }
        textarea { width: 100%; height: 55px; padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; resize: none; outline: none; }
        button.send-btn { width: 100%; background: #ff7e5f; color: white; border: none; padding: 12px; border-radius: 25px; margin-top: 8px; font-weight: bold; cursor: pointer; }
        .back-link { display: block; text-align: center; padding: 8px; color: #aaa; text-decoration: none; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🐾 <span id="current-pet-name">ペチ</span></h2>
        <div class="change-btn" onclick="toggleModal()">
            <span id="current-pet-icon">🐶</span> 交代する
        </div>
    </div>

    <div id="petModal" onclick="toggleModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <p style="text-align:center; font-weight:bold; margin:0;">誰に相談する？</p>
            <div class="pet-grid" id="petGrid">
                <div class="pet-item" data-pet="🐶" data-name="ペチ"><span>🐶</span><br><span class="name">ペチ</span></div>
                <div class="pet-item" data-pet="🐱" data-name="タマ"><span>🐱</span><br><span class="name">タマ</span></div>
                <div class="pet-item" data-pet="🐰" data-name="ピョン"><span>🐰</span><br><span class="name">ピョン</span></div>
                <div class="pet-item" data-pet="🐥" data-name="ピー"><span>🐥</span><br><span class="name">ピー</span></div>
                <div class="pet-item" data-pet="🐼" data-name="パンパン"><span>🐼</span><br><span class="name">パンパン</span></div>
                <div class="pet-item" data-pet="🦊" data-name="コン"><span>🦊</span><br><span class="name">コン</span></div>
                <div class="pet-item" data-pet="🐹" data-name="ハム"><span>🐹</span><br><span class="name">ハム</span></div>
                <div class="pet-item" data-pet="🐻" data-name="クマゴロウ"><span>🐻</span><br><span class="name">クマゴロウ</span></div>
                <div class="pet-item" data-pet="🦁" data-name="レオ"><span>🦁</span><br><span class="name">レオ</span></div>
                <div class="pet-item" data-pet="🐧" data-name="ペンペン"><span>🐧</span><br><span class="name">ペンペン</span></div>
            </div>
        </div>
    </div>

    <div id="chat-log">
        <div class="msg pet">
            <span class="pet-avatar-frame active-pet-icon">🐶</span>
            <span class="pet-sound-label active-pet-sound">ワン！</span>
            ボクの名前は<span class="active-pet-name">ペチ</span>だよ。今日はどうしたの？何でも聞くから、あなたの言葉で話してみて。
        </div>
    </div>

    <div class="input-area">
        <textarea id="userInput" placeholder="今の気持ち、政治、恋愛、何でも..."></textarea>
        <button class="send-btn" onclick="listenToUser()">心を預ける</button>
        <a href="index.html" class="back-link">← トップに戻る</a>
    </div>
</div>

<script>
    let selectedPet = "🐶";
    let selectedName = "ペチ";

    const petProfiles = {
        "🐶": { sound: "ワン！", name: "ペチ" },
        "🐱": { sound: "ニャ〜ン", name: "タマ" },
        "🐰": { sound: "（ヒクヒク）", name: "ピョン" },
        "🐥": { sound: "ピヨ！", name: "ピー" },
        "🐼": { sound: "（ムシャ）", name: "パンパン" },
        "🦊": { sound: "コン！", name: "コン" },
        "🐹": { sound: "クピ〜", name: "ハム" },
        "🐻": { sound: "ガォ！", name: "クマゴロウ" },
        "🦁": { sound: "ガオー！", name: "レオ" },
        "🐧": { sound: "パタパタ", name: "ペンペン" }
    };

    function toggleModal() {
        const modal = document.getElementById('petModal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    // パートナー交代の重要ロジック
    document.getElementById('petGrid').addEventListener('click', (e) => {
        const item = e.target.closest('.pet-item');
        if (!item) return;
        
        selectedPet = item.dataset.pet;
        selectedName = item.dataset.name;
        const profile = petProfiles[selectedPet];

        // 1. ヘッダーの更新
        document.getElementById('current-pet-icon').innerText = selectedPet;
        document.getElementById('current-pet-name').innerText = selectedName;

        // 2. 過去のすべてのアイコン・名前・鳴き声を「今の相棒」に書き換える（全員集合を防ぐ！）
        document.querySelectorAll('.active-pet-icon').forEach(el => el.innerText = selectedPet);
        document.querySelectorAll('.active-pet-sound').forEach(el => el.innerText = profile.sound);
        document.querySelectorAll('.active-pet-name').forEach(el => el.innerText = selectedName);

        toggleModal();
        addMessage('pet', `これからはボク、${selectedName}がお話し相手だよ。よろしくね。`);
    });

    function addMessage(type, text) {
        const log = document.getElementById('chat-log');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        
        if (type === 'pet') {
            const profile = petProfiles[selectedPet];
            msgDiv.innerHTML = `
                <span class="pet-avatar-frame active-pet-icon">${selectedPet}</span>
                <span class="pet-sound-label active-pet-sound">${profile.sound}</span>
                ${text}`;
        } else {
            msgDiv.innerText = text;
        }
        
        log.appendChild(msgDiv);
        log.scrollTop = log.scrollHeight;
    }

    function listenToUser() {
        const input = document.getElementById('userInput').value.trim();
        if (!input) return;

        addMessage('user', input);
        document.getElementById('userInput').value = "";

        setTimeout(() => {
            let msg = "";
            if (input.match(/疲|しんど|つら/)) {
                msg = `「${input.substring(0, 8)}…」って言いたくなるほど、よく頑張ってきたんだね。ボクがそばにいるよ。`;
            } else if (input.match(/政|済|社|国|世/)) {
                msg = `社会のこと、そんな風に感じていたんだね。あなたの考え、しっかり受け止めたよ。`;
            } else if (input.match(/恋|愛|好き/)) {
                msg = `恋の悩みは胸が痛むよね。その「${input.substring(0, 5)}…」っていう気持ち、大切にしよう。`;
            } else {
                msg = `話してくれてありがとう。そうだったんだね…。もっと詳しく教えてくれるかな？`;
            }
            addMessage('pet', msg);
        }, 800);
    }
</script>
</body>
</html>
