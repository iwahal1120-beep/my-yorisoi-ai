<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24h Partner | 対話の実装</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --main: #ff7e5f; }
        body { font-family: sans-serif; margin: 0; background: #fffdf5; overflow: hidden; }
        .container { max-width: 500px; margin: 0 auto; height: 100vh; background: white; position: relative; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        #p1 { display: flex; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; box-sizing: border-box; }
        #p2 { display: none; z-index: 10; background: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .card { border: 2px solid #eee; border-radius: 15px; padding: 15px; cursor: pointer; text-align: center; }
        .header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        #log { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 14px; }
        .user { align-self: flex-end; background: var(--main); color: white; }
        .pet { align-self: flex-start; background: #eee; }
        .input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 5px; }
        textarea { flex: 1; height: 40px; border-radius: 5px; border: 1px solid #ddd; }
        button { background: var(--main); color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="p1" class="page" style="display:flex;">
        <h2 style="color:var(--main);">24h Partner</h2>
        <div class="grid" id="g"></div>
    </div>
    <div id="p2" class="page">
        <div class="header"><button onclick="home()">◀戻る</button><b id="n" style="margin-left:20px;"></b></div>
        <div id="log"></div>
        <div class="input-area">
            <textarea id="in"></textarea>
            <button onclick="talk()">相談</button>
        </div>
    </div>
</div>
<script>
    var D = [
        {i:"🐶", n:"ペチ", m:"s"}, {i:"🦊", n:"コン", m:"a"}, {i:"🦁", n:"レオ", m:"h"},
        {i:"🐻", n:"クマ", m:"p"}, {i:"🐱", n:"タマ", m:"f"}, {i:"🐰", n:"ピョン", m:"e"},
        {i:"🐼", n:"パン", m:"r"}, {i:"🐥", n:"ピー", m:"c"}, {i:"🐹", n:"ハム", m:"l"}, {i:"🐧", n:"ペン", m:"g"}
    ];
    var cur = null;
    var g = document.getElementById('g');
    D.forEach(function(p){
        var d = document.createElement('div');
        d.className='card';
        d.innerHTML='<span style="font-size:24px;">'+p.i+'</span><br><b>'+p.n+'</b>';
        d.onclick=function(){
            cur=p;
            document.getElementById('p1').style.display='none';
            document.getElementById('p2').style.display='flex';
            document.getElementById('n').innerText=p.i+' '+p.n;
            add('pet', p.n+'だ。君を独り言にはさせない。今の現実をぶつけてくれ。');
        };
        g.appendChild(d);
    });
    function home(){ document.getElementById('p1').style.display='flex'; document.getElementById('p2').style.display='none'; document.getElementById('log').innerHTML=''; }
    function add(t, s){
        var l=document.getElementById('log');
        var m=document.createElement('div');
        m.className='msg '+t; m.innerText=s;
        l.appendChild(m); l.scrollTop=l.scrollHeight;
    }
    function talk(){
        var i=document.getElementById('in'); var v=i.value.trim(); if(!v)return;
        add('user', v); i.value='';
        setTimeout(function(){
            var r = "";
            if(cur.m === "a") r = "「"+v+"」という状況。僕の意見は『感情を捨てて物理的な証拠を固めろ』だ。警察を動かすにはそれしかない。";
            else if(cur.m === "h") r = "「"+v+"」だと？許せるか！君の人生を邪魔する奴には、全力で立ち向かう意志を持て。僕が盾になる！";
            else r = "「"+v+ "」…辛かったね。僕の意見は『今は逃げていい』だ。君の安全以上に優先すべきことなんてない。";
            r += " ――僕のこの意見、君はどう思う？";
            add('pet', r);
        }, 700);
    }
</script>
</body>
</html>
