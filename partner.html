<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24h Partner | 最終対話</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --main: #ff7e5f; }
        body { font-family: sans-serif; background: #fffdf5; margin: 0; overflow: hidden; }
        .app { max-width: 500px; margin: 0 auto; height: 100vh; background: white; position: relative; display: flex; flex-direction: column; }
        .page { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; flex-direction: column; background: white; }
        .show { display: flex; z-index: 10; }
        #p1 { padding: 20px; overflow-y: auto; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { border: 2px solid #eee; border-radius: 15px; padding: 15px; cursor: pointer; }
        #log { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .u { align-self: flex-end; background: var(--main); color: white; }
        .p { align-self: flex-start; background: #fff; border: 1px solid #ddd; }
        .input-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        textarea { flex: 1; height: 44px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; resize: none; }
        button { background: var(--main); color: white; border: none; border-radius: 10px; padding: 0 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="app">
    <div id="v1" class="page show">
        <h2 style="color:var(--main); margin-bottom:5px;">24h Partner</h2>
        <p style="font-size:0.8rem; color:#888;">「広辞苑」ではない、10の「意志」との対話。</p>
        <div class="grid" id="g"></div>
    </div>
    <div id="v2" class="page">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center;">
            <button onclick="go(1)" style="border:none; background:none; color:var(--main); font-size:1.2rem;">◀</button>
            <b id="cn" style="margin-left:20px;"></b>
        </div>
        <div id="log"></div>
        <div class="input-bar">
            <textarea id="tx" placeholder="今、起きていることを話して。"></textarea>
            <button onclick="ask()">相談</button>
        </div>
    </div>
</div>
<script>
    const D = [
        {i:"🐶", n:"ペチ", m:"s"}, {i:"🦊", n:"コン", m:"a"}, {i:"🦁", n:"レオ", m:"h"},
        {i:"🐻", n:"クマ", m:"p"}, {i:"🐱", n:"タマ", m:"f"}, {i:"🐰", n:"ピョン", m:"e"},
        {i:"🐼", n:"パン", m:"r"}, {i:"🐥", n:"ピー", m:"c"}, {i:"🐹", n:"ハム", m:"l"}, {i:"🐧", n:"ペン", m:"g"}
    ];
    let cur = null;
    const g = document.getElementById('g');
    D.forEach(p => {
        const d = document.createElement('div');
        d.className='card';
        d.innerHTML=`<span style="font-size:30px">${p.i}</span><br><b>${p.n}</b>`;
        d.onclick=()=>{ cur=p; go(2); document.getElementById('cn').innerText=p.i+' '+p.n; add('p', p.n+'だ。あなたの「独り言」を終わらせに来たよ。何を怯えている？話してみて。'); };
        g.appendChild(d);
    });
    function go(n){ document.getElementById('v1').className='page '+(n==1?'show':''); document.getElementById('v2').className='page '+(n==2?'show':''); if(n==1)document.getElementById('log').innerHTML=''; }
    function add(c, s){ const l=document.getElementById('log'); const d=document.createElement('div'); d.className='msg '+c; d.innerText=s; l.appendChild(d); l.scrollTop=l.scrollHeight; }
    function ask(){
        const t=document.getElementById('tx'); const v=t.value.trim(); if(!v)return;
        add('u', v); t.value='';
        setTimeout(() => {
            let r = "";
            const isDanger = v.match(/怖い|ストーカー|事件|逃|警察/);
            const isFeedback = v.match(/AI|だめ|同じ|繰り返し|詐欺/);

            if(isFeedback) {
                r = `「${v}」…痛いところを突かれたよ。ボクがやってきたのは対話のふりをした『独り言』だった。もう逃げない。ボクの「意志」をぶつけるよ。`;
            } else if(cur.m === "a") {
                r = isDanger ? `「${v}」という状況。分析した結果、ボクの意見は『今すぐ物理的な証拠を固め、第三者に介入させろ』だ。感情は後回しでいい。` : `「${v}」か。ボクなら、その悩みをまず因数分解して、今日やるべきことを3つに絞るよ。`;
            } else if(cur.m === "h") {
                r = isDanger ? `「${v}」だと！？ふざけるな！そんな恐怖に負けてていいのか！ボクが君の怒りに火をつけてやる。戦う意志を持て！` : `「${v}」という想い、もっと熱くぶつけてこいよ！中途半端な悩みなんて、ボクが吹き飛ばしてやる。`;
            } else {
                r = `「${v}」…辛かったね。でもボクの意見は『今は全てを捨てて逃げろ』だ。君の命より大事なものなんて、この世に一つもない。`;
            }
            r += " ――今のボクの言葉、君にはどう響いた？";
            add('p', r);
        }, 800);
    }
</script>
</body>
</html>
