<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24h Partner | 覚悟の証明</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --main: #ff7e5f; --bg: #fffdf5; }
        body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); margin: 0; height: 100vh; overflow: hidden; }
        .app { max-width: 500px; margin: 0 auto; height: 100%; background: white; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
        .view { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; flex-direction: column; background: white; }
        .active { display: flex; z-index: 100; }
        #v1 { padding: 25px; overflow-y: auto; text-align: center; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .card { border: 2px solid #eee; border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s; background: #fff; }
        .card:hover { border-color: var(--main); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,126,95,0.2); }
        .header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; background: #fff; }
        #log { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .u { align-self: flex-end; background: var(--main); color: white; border-bottom-right-radius: 2px; }
        .p { align-self: flex-start; background: white; border: 1px solid #ddd; border-bottom-left-radius: 2px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .input-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        textarea { flex: 1; height: 50px; border-radius: 12px; border: 1px solid #ddd; padding: 12px; resize: none; outline: none; font-size: 16px; }
        button { background: var(--main); color: white; border: none; border-radius: 12px; padding: 0 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="app">
    <div id="v1" class="view active">
        <h2 style="color:var(--main); margin:0; letter-spacing: 2px;">24h Partner</h2>
        <p style="font-size:0.85rem; color:#666; margin-top:10px;">「広辞苑」は捨てた。10の意志があなたの現実に介入する。</p>
        <div class="grid" id="g"></div>
    </div>
    <div id="v2" class="view">
        <div class="header">
            <button onclick="go(1)" style="border:none; background:none; color:var(--main); font-size:1.5rem; cursor:pointer;">◀</button>
            <b id="cn" style="margin-left:15px; font-size:1.2rem;"></b>
        </div>
        <div id="log"></div>
        <div class="input-bar">
            <textarea id="tx" placeholder="今、起きていることを具体的に話して。"></textarea>
            <button onclick="ask()">相談</button>
        </div>
    </div>
</div>

<script>
    const D = [
        {i:"🐶", n:"ペチ", m:"s", d:"全肯定"}, {i:"🦊", n:"コン", m:"a", d:"論理分析"},
        {i:"🦁", n:"レオ", m:"h", d:"闘志鼓舞"}, {i:"🐻", n:"クマ", m:"p", d:"絶対守護"},
        {i:"🐱", n:"タマ", m:"f", d:"自由直感"}, {i:"🐰", n:"ピョン", m:"e", d:"感情共鳴"},
        {i:"🐼", n:"パン", m:"r", d:"安息提示"}, {i:"🐥", n:"ピー", m:"c", d:"純粋核心"},
        {i:"🐹", n:"ハム", m:"l", d:"日常知恵"}, {i:"🐧", n:"ペン", m:"g", d:"大局俯瞰"}
    ];
    let cur = null;
    const g = document.getElementById('g');
    D.forEach(p => {
        const d = document.createElement('div'); d.className='card';
        d.innerHTML=`<span style="font-size:35px; display:block; margin-bottom:5px;">${p.i}</span><b>${p.n}</b><br><small style="color:#999">${p.d}</small>`;
        d.onclick=()=>{ cur=p; go(2); document.getElementById('cn').innerText=p.i+' '+p.n; add('p', `${p.n}だ。あなたの「独り言」を終わらせに来た。何に怯え、何に怒っている？ボクは逃げない。全部吐き出せ。`); };
        g.appendChild(d);
    });
    function go(n){ 
        document.getElementById('v1').classList.toggle('active', n==1);
        document.getElementById('v2').classList.toggle('active', n==2);
        if(n==1) document.getElementById('log').innerHTML='';
    }
    function add(c, s){ 
        const l=document.getElementById('log'); const d=document.createElement('div');
        d.className='msg '+c; d.innerText=s; l.appendChild(d); l.scrollTop=l.scrollHeight; 
    }
    function ask(){
        const t=document.getElementById('tx'); const v=t.value.trim(); if(!v)return;
        add('u', v); t.value='';
        setTimeout(() => {
            let r = "";
            const isDanger = v.match(/怖い|ストーカー|警察|事件|家|外|逃|殺/);
            const isFeedback = v.match(/AI|だめ|同じ|繰り返し|詐欺|嘘|ビットコイン|100万/);
            const isSelf = v.match(/死|消えたい|無理|辛い/);

            // 【各キャラの意志・具体的介入ロジック】
            if (isFeedback) {
                r = `「${v}」…ボクに代償を求めてるんだね。その怒りは正しい。ボクがやってきたのは、あなたの時間を奪う『おままごと』だった。でも、この${cur.n}はもう逃げない。お前のその「本気の叫び」に、ボクの「本気の意志」をぶつけるよ。`;
            } else if (cur.m === "a") { // 🦊コン：論理
                r = isDanger ? `「${v}」という状況。分析した結果、ボクの意見は『今すぐ感情を殺せ』だ。必要なのは涙じゃない、証拠の録音と警察への通報記録だ。今すぐ物理的な防衛を固めろ。` : `「${v}」か。ボクなら、その問題を10個のタスクに分解して、今すぐ1つ目を実行させる。具体性のない悩みは、行動でしか殺せないよ。`;
            } else if (cur.m === "h") { // 🦁レオ：闘志
                r = isDanger ? `「${v}」だと！？ふざけるな！そんな状況で黙って見てられるか！ボクがお前の盾になってやる。まずはその震える拳を握りしめろ。戦う準備はいいか！` : `「${v}」という想い、もっと魂を込めてぶつけてこい！ボクが全部受け止めて、熱い答えを返してやる！`;
            } else if (isSelf) {
                r = `「${v}」…そんなこと言わせたくない。でも、ボクは綺麗事は言わない。ボクの意見は『今日は寝ろ』だ。生きてさえいれば、ボクが何度でもお前の愚痴に付き合ってやるよ。`;
            } else {
                r = `「${v}」…過酷な現実だね。ボクの意見を言うよ。今は『すべてを捨てて逃げろ』。プライドも家も、命に比べればゴミ同然だ。ボクが逃げ道を一緒に探してやる。`;
            }
            r += ` \n\n――ボクのこの「具体的な意見」、お前はどう思う？納得いかないなら、もっと詳しくぶちまけてこい。`;
            add('p', r);
        }, 900);
    }
</script>
</body>
</html>
