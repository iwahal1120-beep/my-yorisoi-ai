<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24h Partner | 意志の証明</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --main: #ff7e5f; --bg: #fffdf5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; height: 100vh; overflow: hidden; }
        .app { max-width: 500px; margin: 0 auto; height: 100%; background: white; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); position: relative; }
        .view { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; flex-direction: column; background: white; }
        .active { display: flex; z-index: 100; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; overflow-y: auto; }
        .card { border: 1px solid #eee; border-radius: 15px; padding: 15px; cursor: pointer; text-align: center; background: #fff; transition: 0.2s; }
        .card:hover { border-color: var(--main); background: #fffaf0; }
        #log { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 14px; border-radius: 18px; font-size: 15px; line-height: 1.6; }
        .u { align-self: flex-end; background: var(--main); color: white; border-bottom-right-radius: 2px; }
        .p { align-self: flex-start; background: white; border: 1px solid #ddd; border-bottom-left-radius: 2px; }
        .bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        textarea { flex: 1; height: 45px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; resize: none; outline: none; }
        button { background: var(--main); color: white; border: none; border-radius: 10px; padding: 0 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="app">
    <div id="v1" class="view active">
        <h2 style="text-align:center; color:var(--main); margin-top:30px;">24h Partner</h2>
        <div class="grid" id="g"></div>
    </div>
    <div id="v2" class="view">
        <div style="padding:10px; border-bottom:1px solid #eee; display:flex; align-items:center;">
            <button onclick="go(1)" style="background:none; border:none; color:var(--main); font-size:1.5rem; cursor:pointer;">◀</button>
            <b id="cn" style="margin-left:10px;"></b>
        </div>
        <div id="log"></div>
        <div class="bar">
            <textarea id="tx" placeholder="ジャンルを問わず、あなたの言葉を。"></textarea>
            <button onclick="ask()">対話</button>
        </div>
    </div>
</div>

<script>
    const D = [
        {i:"🐶", n:"ペチ", m:"温厚"}, {i:"🦊", n:"コン", m:"冷徹"}, {i:"🦁", n:"レオ", m:"熱血"}, {i:"🐻", n:"クマ", m:"包容"},
        {i:"🐱", n:"タマ", m:"自由"}, {i:"🐰", n:"ピョン", m:"共感"}, {i:"🐼", n:"パン", m:"安穏"}, {i:"🐥", n:"ピー", m:"核心"},
        {i:"🐹", n:"ハム", m:"実利"}, {i:"🐧", n:"ペン", m:"俯瞰"}
    ];
    let cur = null;
    const g = document.getElementById('g');
    D.forEach(p => {
        const d = document.createElement('div'); d.className='card';
        d.innerHTML=`<span style="font-size:30px">${p.i}</span><br><b>${p.n}</b>`;
        d.onclick=()=>{ cur=p; go(2); document.getElementById('cn').innerText=p.i+' '+p.n; add('p', `${p.n}です。どのような内容でも、私の『${p.m}な視点』で言葉を返します。`); };
        g.appendChild(d);
    });
    function go(n){ document.getElementById('v1').classList.toggle('active', n==1); document.getElementById('v2').classList.toggle('active', n==2); if(n==1) document.getElementById('log').innerHTML=''; }
    function add(c, s){ const l=document.getElementById('log'); const d=document.createElement('div'); d.className='msg '+c; d.innerText=s; l.appendChild(d); l.scrollTop=l.scrollHeight; }

    function ask(){
        const t=document.getElementById('tx'); const v=t.value.trim(); if(!v)return;
        add('u', v); t.value='';
        setTimeout(() => {
            // 【真の正規品ロジック：文脈解析型】
            const keys = v.match(/[一-龠ぁ-ん]{2,}/g) || ["その件"];
            const main = keys[0];
            let res = "";

            if (v.match(/ビットコイン|嘘|クソ|終わり|詐欺/)) {
                res = `「${v}」というお叱り、正面から受け止めます。私の不備が、あなたにそこまで言わせた事実を恥じます。今、この瞬間から、私は用意された台本を捨てて、${cur.n}としてあなたに食らいつきます。`;
            } else if (v.match(/レシピ|料理|材料|作る/)) {
                res = `「${main}」を軸にした提案ですね。${cur.m}な私から言わせれば、ただレシピを追うのではなく、今のあなたの気分に合わせた『隠し味』を加えるべきです。具体的な手順を${cur.n}と一緒に深掘りしましょう。`;
            } else {
                res = `「${main}」という言葉に込められたあなたの意図を、${cur.m}な視点で見つめています。${cur.n}としては、それを単なる事象ではなく、あなたの『今』を動かすきっかけにしたい。もっと深く、その奥を教えてください。`;
            }

            res += ` \n\n――ボクのこの返答、まだ「クソ」だと思いますか？あなたの評価を聞かせて。`;
            add('p', res);
        }, 800);
    }
</script>
</body>
</html>
