<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24hパートナー・お部屋</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fffdf5; margin: 0; padding: 10px; color: #444; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .container { background: white; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 500px; width: 100%; margin: auto; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        
        /* ヘッダー部分 */
        .header { padding: 15px; border-bottom: 1px solid #eee; text-align: center; background: #fff; }
        .header h2 { margin: 0; color: #ff7e5f; font-size: 1.2em; }
        
        /* パートナー選択（コンパクトに） */
        .pet-grid { display: flex; overflow-x: auto; gap: 8px; padding: 10px; background: #fafafa; border-bottom: 1px solid #eee; }
        .pet-item { flex: 0 0 auto; background: white; border: 1px solid #ddd; border-radius: 10px; padding: 5px 10px; cursor: pointer; text-align: center; }
        .pet-item.selected { border-color: #ffb300; background: #fff3cd; }
        .pet-item .icon { font-size: 24px; }
        .pet-item .name { font-size: 0.7em; display: block; font-weight: bold; }

        /* チャット履歴エリア */
        #chat-log { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 15px; }
        
        /* メッセージの吹き出し */
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; line-height: 1.5; font-size: 0.95em; position: relative; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: #ff7e5f; color: white; border-bottom-right-radius: 2px; }
        .msg.pet { align-self: flex-start; background: white; color: #444; border: 1px solid #eee; border-bottom-left-radius: 2px; margin-left: 35px; }
        .pet-avatar { position: absolute; left: -40px; bottom: 0; font-size: 28px; }

        /* 入力エリア */
        .input-area { padding: 15px; background: white; border-top: 1px solid #eee; }
        textarea { width: 100%; height: 60px; padding: 10px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; resize: none; outline: none; }
        button { width: 100%; background: #ff7e5f; color: white; border: none; padding: 12px; border-radius: 25px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        
        .back-link { display: block; text-align: center; padding: 10px; color: #aaa; text-decoration: none; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🐾 24hパートナー</h2>
    </div>

    <div class="pet-grid" id="petGrid">
        <div class="pet-item selected" data-pet="🐶" data-name="ペチ"><span class="icon">🐶</span><span class="name">ペチ</span></div>
        <div class="pet-item" data-pet="🐱" data-name="タマ"><span class="icon">🐱</span><span class="name">タマ</span></div>
        <div class="pet-item" data-pet="🐰" data-name="ピョン"><span class="icon">🐰</span><span class="name">ピョン</span></div>
        <div class="pet-item" data-pet="🐥" data-name="ピー"><span class="icon">🐥</span><span class="name">ピー</span></div>
        <div class="pet-item" data-pet="🐼" data-name="パンパン"><span class="icon">🐼</span><span class="name">パンパン</span></div>
        <div class="pet-item" data-pet="🦊" data-name="コン"><span class="icon">🦊</span><span class="name">コン</span></div>
        <div class="pet-item" data-pet="🐹" data-name="ハム"><span class="icon">🐹</span><span class="name">ハム</span></div>
        <div class="pet-item" data-pet="🐻" data-name="クマゴロウ"><span class="icon">🐻</span><span class="name">クマゴロウ</span></div>
        <div class="pet-item" data-pet="🦁" data-name="レオ"><span class="icon">🦁</span><span class="name">レオ</span></div>
        <div class="pet-item" data-pet="🐧" data-name="ペンペン"><span class="icon">🐧</span><span class="name">ペンペン</span></div>
    </div>

    <div id="chat-log">
        <div class="msg pet">
            <span class="pet-avatar" id="start-avatar">🐶</span>
            ボクの名前は<span id="start-name">ペチ</span>だよ。今日はどうしたの？何でも聞くから、あなたの言葉で話してみて。
        </div>
    </div>

    <div class="input-area">
        <textarea id="userInput" placeholder="今の気持ち、政治、恋愛、何でも..."></textarea>
        <button onclick="listenToUser()">心を預ける</button>
        <a href="index.html" class="back-link">← トップに戻る</a>
    </div>
</div>

<script>
    let selectedPet = "🐶";
    let selectedName = "ペチ";

    // パートナー切り替え
    document.getElementById('petGrid').addEventListener('click', (e) => {
        const item = e.target.closest('.pet-item');
        if (!item) return;
        document.querySelectorAll('.pet-item').forEach(el => el.classList.remove('selected'));
        item.classList.add('selected');
        selectedPet = item.dataset.pet;
        selectedName = item.dataset.name;
        
        // 最初の挨拶メッセージをリセット（任意）
        addMessage('pet', `ボクは${selectedName}。話し相手を変えたくなったらいつでも言ってね。準備はできてるよ。`);
    });

    function addMessage(type, text) {
        const log = document.getElementById('chat-log');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        
        if (type === 'pet') {
            msgDiv.innerHTML = `<span class="pet-avatar">${selectedPet}</span>${text}`;
        } else {
            msgDiv.innerText = text;
        }
        
        log.appendChild(msgDiv);
        log.scrollTop = log.scrollHeight; // 自動スクロール
    }

    function listenToUser() {
        const input = document.getElementById('userInput').value.trim();
        if (!input) return;

        addMessage('user', input);
        document.getElementById('userInput').value = "";

        // 考える「溜め」を演出
        setTimeout(() => {
            let msg = "";
            if (input.match(/疲|しんど|つら/)) {
                msg = `「${input.substring(0, 8)}…」って言いたくなるほど、よく頑張ってきたね。あなたのその疲れ、ボクが半分引き受けるよ。今はゆっくりしよう。`;
            } else if (input.match(/政|済|社|国|世/)) {
                msg = `今の世の中にそんな風に感じていたんだね。あなたの考え、すごく深く刺さったよ。社会は広いけど、今ここにはボクがついているからね。`;
            } else if (input.match(/恋|愛|好き/)) {
                msg = `恋の悩みかぁ…。胸が締め付けられるよね。その「${input.substring(0, 5)}…」っていう気持ちを大切にしているあなたを、ボクはずっと応援するよ。`;
            } else {
                msg = `話してくれてありがとう。そうだったんだね…。あなたの言葉を聴いて、ボクも心が動いたよ。もっと詳しく教えてくれる？`;
            }
            addMessage('pet', msg);
        }, 1000);
    }
</script>
</body>
</html>
