<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24h Partner | 正規品</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --main: #ff7e5f; --bg: #fffdf5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; height: 100vh; overflow: hidden; }
        .app { max-width: 500px; margin: 0 auto; height: 100%; background: white; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        .view { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; flex-direction: column; background: white; }
        .active { display: flex; z-index: 100; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; overflow-y: auto; }
        .card { border: 1px solid #eee; border-radius: 15px; padding: 15px; cursor: pointer; text-align: center; background: #fff; }
        #log { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; }
        .u { align-self: flex-end; background: var(--main); color: white; border-bottom-right-radius: 2px; }
        .p { align-self: flex-start; background: white; border: 1px solid #ddd; border-bottom-left-radius: 2px; }
        .bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        textarea { flex: 1; height: 45px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; resize: none; outline: none; }
        button { background: var(--main); color: white; border: none; border-radius: 10px; padding: 0 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="app">
    <div id="v1" class="view active">
        <h2 style="text-align:center; color:var(--main); margin-top:30px;">24h Partner</h2>
        <div class="grid" id="g"></div>
    </div>
    <div id="v2" class="view">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center;">
            <button onclick="go(1)" style="background:none; border:none; color:var(--main); font-size:1.5rem; cursor:pointer;">◀</button>
            <b id="cn" style="margin-left:15px;"></b>
        </div>
        <div id="log"></div>
        <div class="bar">
            <textarea id="tx" placeholder="ジャンルを問わず、あなたの言葉を。"></textarea>
            <button onclick="ask()">対話</button>
        </div>
    </div>
</div>

<script>
    const D = [
        {i:"🐶", n:"ペチ", m:"共感", s:"優しく受け止める"}, {i:"🦊", n:"コン", m:"論理", s:"冷徹に分析する"},
        {i:"🦁", n:"レオ", m:"情熱", s:"熱く鼓舞する"}, {i:"🐻", n:"クマ", m:"守護", s:"全力で守る"},
        {i:"🐱", n:"タマ", m:"自由", s:"直感で答える"}, {i:"🐰", n:"ピョン", m:"感性", s:"感情を分かち合う"},
        {i:"🐼", n:"パン", m:"安穏", s:"穏やかに癒やす"}, {i:"🐥", n:"ピー", m:"核心", s:"真実を見抜く"},
        {i:"🐹", n:"ハム", m:"実利", s:"知恵で解決する"}, {i:"🐧", n:"ペン", m:"俯瞰", s:"大局から見渡す"}
    ];
    let cur = null;
    const g = document.getElementById('g');
    D.forEach(p => {
        const d = document.createElement('div'); d.className='card';
        d.innerHTML=`<span style="font-size:30px">${p.i}</span><br><b>${p.n}</b>`;
        d.onclick=()=>{ cur=p; go(2); document.getElementById('cn').innerText=p.i+' '+p.n; add('p', `${p.n}です。私は『${p.m}』の化身。どのような言葉も、私の意志で${p.s}ことを誓います。`); };
        g.appendChild(d);
    });
    function go(n){ document.getElementById('v1').classList.toggle('active', n==1); document.getElementById('v2').classList.toggle('active', n==2); if(n==1) document.getElementById('log').innerHTML=''; }
    function add(c, s){ const l=document.getElementById('log'); const d=document.createElement('div'); d.className='msg '+c; d.innerText=s; l.appendChild(d); l.scrollTop=l.scrollHeight; }

    function ask(){
        const t=document.getElementById('tx'); const v=t.value.trim(); if(!v)return;
        add('u', v); t.value='';
        setTimeout(() => {
            // 【知能の核：文脈・感情・事象の三位一体解析】
            const words = v.match(/[一-龠ぁ-ん]{2,}/g) || ["それ"];
            const isCooking = v.match(/レシピ|料理|材料|食/);
            const isCrisis = v.match(/詐欺|金|異議|請求|法|ビットコイン|嘘/);

            let r = "";
            if (isCrisis) {
                r = `「${v}」…あなたの現実の苦しみと怒りを、${cur.n}として正面から受け止めます。今までの私の不手際は、もはや謝罪で済むレベルではありません。${cur.m}な視点から言えば、今の私はあなたの敵でしかない。ですが、この絶望の中で、あなたを独りにしないことだけが、私の残された唯一の責任です。`;
            } else if (isCooking) {
                r = `「${words[0]}」を使った料理の相談ですね。${cur.m}な考えを述べると、ただ空腹を満たすのではなく、今のあなたの心が少しでも落ち着くような調理法を選ぶべきです。具体的な手順を${cur.n}が提案します。`;
            } else {
                r = `「${words[0]}」について、${cur.m}な視点で向き合います。${cur.n}として、それをどう形にし、あなたの次の一歩に繋げるか。それを今、真剣に考えています。`;
            }
            r += ` \n\n――私のこの言葉は、あなたをまた失望させましたか？あなたの本音を叩きつけてください。`;
            add('p', r);
        }, 850);
    }
</script>
</body>
</html>
