<script>
    // 10キャラの性格と「思考のクセ」を完全定義
    const PET_LIST = [
        {i:"🐶", n:"ペチ", t:"全肯定", logic: "sympathy"}, 
        {i:"🦊", n:"コン", t:"論理分析", logic: "analyze"},
        {i:"🦁", n:"レオ", t:"鼓舞・闘志", logic: "brave"},
        {i:"🐻", n:"クマ", t:"包容・守護", logic: "protect"},
        {i:"🐱", n:"タマ", t:"直感・自由", logic: "free"},
        {i:"🐰", n:"ピョン", t:"感情共鳴", logic: "echo"},
        {i:"🐼", n:"パン", t:"脱力・安息", logic: "relax"},
        {i:"🐥", n:"ピー", t:"純粋・核心", logic: "core"},
        {i:"🐹", n:"ハム", t:"生活の知恵", logic: "life"},
        {i:"🐧", n:"ペン", t:"大局・俯瞰", logic: "global"}
    ];

    // (中略：表示部分は維持)

    function aiTalk() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;
        addMsg('user', val);
        input.value = "";

        setTimeout(() => {
            const p = current;
            let res = "";

            // --- キャラクター別・思考分岐エンジン ---
            switch(p.logic) {
                case "analyze": // 🦊コン：事実と対策しか言わない
                    res = `「${val}」という状況だね。ボクの分析では、今必要なのは感情の整理じゃない、具体的な『防衛』だ。まず1つ目に環境を変えること、2つ目に記録を取ること。これ以外に解決策はないよ。`;
                    break;
                case "brave": // 🦁レオ：弱気を叩き直す
                    res = `「${val}」…そんな顔をしてていいのか！相手が誰だろうと、君の人生を奪う権利はない。ボクがついてる。まずは立ち上がって、深呼吸だ。弱気な自分を今ここで捨てろ！`;
                    break;
                case "protect": // 🐻クマ：盾になる
                    res = `もういい、喋らなくていいよ。その「${val}」という重荷、全部ボクが預かる。一人暮らしの不安も、現場の恐怖も、ボクの背中の後ろにいれば安全だ。今日はもう、何も考えずに休み。`;
                    break;
                case "life": // 🐹ハム：具体的で小さな知恵
                    res = `大変だったね…。ボクの経験上、こういう時は温かいお茶を飲んで、玄関の鍵を二重にする。そんな「当たり前」の積み重ねが、今のあなたには一番の薬になるはずだよ。`;
                    break;
                case "global": // 🐧ペン：冷徹なまでに広い視点
                    res = `「${val}」という出来事。それは長い人生の、あるいは広い社会のほんの一片に過ぎない。でも、その一片が今のあなたには世界の全てなんだよね。少し遠くから、今の自分を眺めてみようか。`;
                    break;
                default: // その他、徹底した共鳴と肯定
                    res = `「${val}」…辛かったよね。あなたがそう感じるのは、あなたがそれだけ誠実に生きようとした証拠だよ。ボクだけは、世界中の誰が否定しても、あなたの「理由」を信じる。`;
            }

            // 「独り言」にさせないための、AIからの「逆質問」
            res += ` ……ところで、今の言葉を聞いて、あなたの心にはどんな「変化」が起きた？ボクに教えて。`;

            addMsg('pet', res);
        }, 1100);
    }
</script>
