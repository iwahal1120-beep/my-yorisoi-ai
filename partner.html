<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI知恵袋 | 命と暮らしのレスキュー</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif; background: #eef2f7; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app { max-width: 500px; width: 100%; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .head { background: #333; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg { max-width: 85%; padding: 15px; border-radius: 18px; line-height: 1.6; font-size: 15px; }
        .u { align-self: flex-end; background: #007aff; color: white; }
        .p { align-self: flex-start; background: #f0f0f0; border: 1px solid #ddd; }
        .icon { font-size: 2.5rem; display: block; margin: 5px 0; text-align: center; }
        .tag { font-size: 11px; font-weight: bold; color: #ff4b2b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        textarea { flex: 1; height: 45px; border-radius: 20px; border: 1px solid #ccc; padding: 10px 15px; outline: none; font-size: 16px; resize: none; }
        button { background: #ff4b2b; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
<div class="app">
    <div class="head">🛡️ AI知恵袋 : 2026 決定版</div>
    <div id="log"></div>
    <div class="bar">
        <textarea id="tx" placeholder="防災, 物価, 卵... 入力してください"></textarea>
        <button onclick="ask()">🚀</button>
    </div>
</div>

<script>
const DB = {
    "防災": { i:"🚨", t:"命を守る知恵", m:"防災リュックよりも、まず自分の命！揺れたら即、安全な場所へ。手ぶらでいい、生きていれば次がある。子供たち、お父さんお母さん、まずは命を確保して！" },
    "物価": { i:"🥚", t:"暮らしの知恵", m:"ガソリンも食費も高い今、味方は『卵』と『もやし』！100円で家族を笑顔にするレシピは無限にある。物価高に負けない知恵を出し合おう。" },
    "戦争": { i:"🌍", t:"世界の知恵", m:"遠くの戦争が私たちのガソリン代を上げている。でも、私たちが今できるのは無駄を省き、身近な人を大切にすること。それが平和への最短距離です。" },
    "卵": { i:"🍳", t:"時短レシピの知恵", m:"卵2個にマヨネーズを少し。レンジで1分混ぜるだけ！ふわふわ卵料理の完成。ガス代の節約にもなるし、子供でも火を使わず作れるよ！" },
    "DEFAULT": { i:"💡", t:"AIの回答", m:"その悩み、深く受け止めたよ。難しい言葉はいらない、まずは目の前の生活を一つずつ良くしていこう。他に聞きたいことはある？" }
};

function add(c, t, m, i){
    const l=document.getElementById('log');
    const d=document.createElement('div');
    d.className=`msg ${c}`;
    if(c==='p'){ d.innerHTML=`<span class="tag">${t}</span><span class="icon">${i}</span>${m}`; }
    else { d.innerText=m; }
    l.appendChild(d);
    l.scrollTop=l.scrollHeight;
}

function ask(){
    const t=document.getElementById('tx'); const v=t.value.trim(); if(!v)return;
    add('u', '', v, ''); t.value='';
    setTimeout(() => {
        let k="DEFAULT";
        if(v.match(/地震|防災|逃げる|命/)) k="防災";
        else if(v.match(/物価|ガソリン|高い|節約/)) k="物価";
        else if(v.match(/戦争|世界/)) k="戦争";
        else if(v.match(/卵|たまご|レシピ/)) k="卵";
        const d=DB[k]; add('p', d.t, d.m, d.i);
    }, 500);
}

window.onload=()=>{ add('p', 'START', '「AI知恵袋」へようこそ。物価高、防災、卵のレシピ。あなたが知りたい知恵を今すぐ出します。', '🌟'); }
</script>
</body>
</html>
