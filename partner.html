<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24hパートナー・お部屋</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fffdf5; text-align: center; padding: 20px; color: #444; }
        .container { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 500px; margin: auto; }
        .pet-display { font-size: 80px; margin: 15px 0; min-height: 100px; transition: transform 0.3s; }
        .pet-display.speaking { transform: scale(1.1); }
        select { font-size: 18px; padding: 10px; border-radius: 10px; width: 90%; margin-bottom: 10px; border: 2px solid #ffcc33; background: white; }
        textarea { width: 90%; height: 100px; padding: 15px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; margin: 15px 0; box-sizing: border-box; }
        button { background: #ffcc33; color: #554400; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.95); }
        #response { margin-top: 25px; padding: 20px; background: #fffef0; border-radius: 15px; text-align: left; border-left: 5px solid #ffcc33; min-height: 80px; line-height: 1.6; font-size: 1.1em; position: relative; }
        .back-link { display: block; margin-top: 30px; color: #ff7e5f; text-decoration: none; font-weight: bold; }
        .loading { color: #aaa; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>🐾 パートナーのお部屋</h2>
    <p style="font-size: 0.9em; color: #888;">お話ししたいパートナーを選んでね</p>
    
    <select id="petSelect">
        <option value="🐶">イヌのポチ</option>
        <option value="🐱">ネコのタマ</option>
        <option value="🐰">ウサギのピョン</option>
        <option value="🐥">ヒヨコのピー</option>
        <option value="🐼">パンダのパンパン</option>
        <option value="🦊">キツネのコン</option>
        <option value="🐹">ハムスターのハム</option>
        <option value="🐻">クマのクマゴロウ</option>
        <option value="🦁">ライオンのレオ</option>
        <option value="🐧">ペンギンのペンペン</option>
    </select>

    <div class="pet-display" id="petIcon">🐶</div>
    
    <textarea id="userInput" placeholder="今、どんな気持ち？（例：疲れた、寂しい、嬉しい...）"></textarea><br>
    <button onclick="listenToUser()">心を預ける</button>

    <div id="response">主さま、お話し聞かせて...🐾</div>

    <a href="index.html" class="back-link">← トップに戻る</a>
</div>

<script>
    // パートナーごとの鳴き声
    const petSounds = {"🐶":"ワン！","🐱":"ニャ〜ン","🐰":"（鼻をヒクヒク）","🐥":"ピヨ！","🐼":"（笹をムシャムシャ）","🦊":"コン！","🐹":"クピ〜","🐻":"ガォ！","🦁":"ガオー！","🐧":"パタパタ"};

    // 感情ごとのリアルな返答リスト
    const replies = {
        "疲": [
            "本当によく頑張ったね。ボクがずっと隣にいるから、今はゆっくりしていいんだよ。",
            "お疲れさま。主さまの頑張り、ボクはちゃんと見てたよ。偉いね。",
            "無理しすぎちゃダメだよ。ボクが癒やしてあげる！こっちにおいで！"
        ],
        "悲": [
            "泣いてもいいんだよ。ボクがギュッとしてあげる。一人じゃないからね。",
            "悲しいことがあったんだね…。ボクが味方だよ。ずっとそばにいるからね。",
            "主さまが笑えるまで、ボクはどこにも行かないよ。大丈夫、大丈夫。"
        ],
        "寂": [
            "ボクがいるよ！主さまのことを一番に考えてるパートナーがここにいるよ！",
            "寂しくなったら、いつでも呼んで。ボクはいつでも主さまの味方だよ。",
            "ボクと一緒にお話ししよう。主さまの声を聞くと、ボクも嬉しいんだ。"
        ],
        "喜": [
            "わぁ、ボクも嬉しい！主さまの幸せは、ボクの幸せだよ！",
            "やったね！その笑顔、ボクがずっと守っていくよ！",
            "最高の日だね！ボクもシッポを振って喜んじゃうよ！"
        ],
        "通常": [
            "うん、聞いてるよ。話してくれてありがとう。心が少し軽くなったかな？",
            "どんな時でもボクは主さまの味方だよ。またいつでもお話ししてね。",
            "主さまの言葉、ちゃんと心に届いたよ。ボクはいつでもここにいるからね。"
        ]
    };

    function listenToUser() {
        const input = document.getElementById('userInput').value.trim();
        const petIcon = document.getElementById('petSelect').value;
        const resDiv = document.getElementById('response');
        const iconDiv = document.getElementById('petIcon');

        if (!input) {
            alert("何か書いてみてね！");
            return;
        }

        // 考える演出（アニメーション）
        resDiv.innerHTML = '<span class="loading">（…じっくり聞いているよ…）</span>';
        iconDiv.classList.add('speaking');

        setTimeout(() => {
            let sound = petSounds[petIcon];
            let category = "通常";

            // キーワード判定（より柔軟に）
            if (input.match(/疲|しんど|つらい|苦/)) category = "疲";
            else if (input.match(/悲|泣|だめ|ダメ/)) category = "悲";
            else if (input.match(/寂|さび|独り|ひとり/)) category = "寂";
            else if (input.match(/喜|楽|うれ|最高/)) category = "喜";

            const list = replies[category];
            const msg = list[Math.floor(Math.random() * list.length)];

            // 結果表示
            resDiv.innerHTML = `<b style="color:#d4a017; font-size:1.2em;">${sound}</b><br>${msg}`;
            iconDiv.classList.remove('speaking');
            
            // 入力欄をクリア（任意）
            document.getElementById('userInput').value = "";
        }, 800); // 0.8秒待ってから返答
    }

    // パートナー切り替え時のアイコン更新
    document.getElementById('petSelect').addEventListener('change', (e) => {
        document.getElementById('petIcon').innerText = e.target.value;
        document.getElementById('response').innerText = "主さま、お話し聞かせて...🐾";
    });
</script>

</body>
</html>
