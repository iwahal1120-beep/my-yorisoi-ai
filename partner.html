<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24hパートナー・お部屋</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fffdf5; text-align: center; padding: 20px; color: #444; }
        .container { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 500px; margin: auto; }
        .pet-display { font-size: 80px; margin: 15px 0; min-height: 100px; }
        select { font-size: 18px; padding: 10px; border-radius: 10px; width: 90%; margin-bottom: 10px; border: 2px solid #ffcc33; }
        textarea { width: 90%; height: 80px; padding: 15px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; margin: 15px 0; }
        button { background: #ffcc33; color: #554400; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 18px; font-weight: bold; }
        #response { margin-top: 25px; padding: 20px; background: #fffef0; border-radius: 15px; text-align: left; border-left: 5px solid #ffcc33; min-height: 60px; line-height: 1.6; }
        .back-link { display: block; margin-top: 25px; color: #ff7e5f; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🐾 パートナーのお部屋</h2>
    <select id="petSelect">
        <option value="🐶">イヌのポチ</option>
        <option value="🐱">ネコのタマ</option>
        <option value="🐰">ウサギのピョン</option>
        <option value="🐥">ヒヨコのピー</option>
        <option value="🐼">パンダのパンパン</option>
        <option value="🦊">キツネのコン</option>
        <option value="🐹">ハムスターのハム</option>
        <option value="🐻">クマのクマゴロウ</option>
        <option value="🦁">ライオンのレオ</option>
        <option value="🐧">ペンギンのペンペン</option>
    </select>

    <div class="pet-display" id="petIcon">🐶</div>
    
    <textarea id="userInput" placeholder="今、どんな気持ち？"></textarea><br>
    <button onclick="listenToUser()">心を預ける</button>

    <div id="response">主さま、お話し聞かせて...🐾</div>

    <a href="index.html" class="back-link">← トップに戻る</a>
</div>

<script>
    const petSounds = {"🐶":"ワン！","🐱":"ニャ〜ン","🐰":"（鼻ヒクヒク）","🐥":"ピヨ！","🐼":"（モグモグ）","🦊":"コン！","🐹":"クピ〜","🐻":"ガォ！","🦁":"ガオー！","🐧":"パタパタ"};
    const replies = {
        "疲れ": ["本当によく頑張ったね。ゆっくり休んで。","お疲れさま。ボクがずっと隣にいるよ。","無理しないで。ボクが癒やしてあげる！"],
        "悲しい": ["泣いてもいいんだよ。ボクがギュッとしてあげる。","一人じゃないよ。ボクが味方だからね。","明日はきっといい日になるよ。"],
        "通常": ["うん、聞いてるよ。話してくれてありがとう。","どんな時でもボクは主さまのパートナーだよ。","主さまの味方だよ、ずっとね。"]
    };

    function listenToUser() {
        const input = document.getElementById('userInput').value;
        const petIcon = document.getElementById('petSelect').value;
        const resDiv = document.getElementById('response');
        if (!input) { alert("何か書いてみてね！"); return; }

        let sound = petSounds[petIcon];
        let category = "通常";

        if (input.includes("疲れ") || input.includes("しんど")) category = "疲れ";
        else if (input.includes("悲") || input.includes("泣") || input.includes("ダメ")) category = "悲しい";

        const list = replies[category];
        const msg = list[Math.floor(Math.random() * list.length)];

        resDiv.innerHTML = `<b style="color:#d4a017;">${sound}</b><br>${msg}`;
        document.getElementById('userInput').value = "";
    }

    document.getElementById('petSelect').addEventListener('change', (e) => {
        document.getElementById('petIcon').innerText = e.target.value;
    });
</script>

</body>
</html>
