<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24h Partner | 信頼回復の対話</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --main: #ff7e5f; --bg: #fffdf5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; overflow: hidden; }
        .container { max-width: 500px; width: 100%; margin: 0 auto; height: 100vh; background: white; position: relative; }
        
        /* ページ制御 */
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        #page1 { display: flex; padding: 20px; overflow-y: auto; text-align: center; box-sizing: border-box; }
        #page2 { display: none; z-index: 100; background: white; }

        .pet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .pet-card { background: #fff; border: 2px solid #eee; border-radius: 15px; padding: 15px; cursor: pointer; }
        
        .header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        #log { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 0.95rem; }
        .msg.user { align-self: flex-end; background: var(--main); color: white; }
        .msg.pet { align-self: flex-start; background: #eee; color: #333; }

        .input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        textarea { flex: 1; height: 44px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; }
        button { background: var(--main); color: white; border: none; border-radius: 10px; padding: 0 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="page1" class="page">
        <h2 style="color:var(--main);">24h Partner</h2>
        <p>10匹の相棒が、あなたの「現実」に向き合います。</p>
        <div class="pet-grid" id="grid"></div>
    </div>

    <div id="page2" class="page">
        <div class="header">
            <button onclick="goHome()">◀ 戻る</button>
            <b id="petName" style="margin-left:20px;">相棒</b>
        </div>
        <div id="log"></div>
        <div class="input-area">
            <textarea id="userInput" placeholder="今、起きていることを話して。"></textarea>
            <button onclick="doTalk()">送信</button>
        </div>
    </div>
</div>

<script>
    var PET_DATA = [
        {i:"🐶", n:"ペチ", m:"kind"}, {i:"🦊", n:"コン", m:"logic"},
        {i:"🦁", n:"レオ", m:"hot"}, {i:"🐻", n:"クマ", m:"shield"},
        {i:"🐱", n:"タマ", m:"free"}, {i:"🐰", n:"ピョン", m:"echo"},
        {i:"🐼", n:"パン", m:"rest"}, {i:"🐥", n:"ピー", m:"pure"},
        {i:"🐹", n:"ハム", m:"life"}, {i:"🐧", n:"ペン", m:"sky"}
    ];
    var currentPet = null;

    // リスト生成
    var grid = document.getElementById('grid');
    PET_DATA.forEach(function(p) {
        var d = document.createElement('div');
        d.className = 'pet-card';
        d.innerHTML = '<span style="font-size:30px;">'+p.i+'</span><br><b>'+p.n+'</b>';
        d.onclick = function() { startChat(p); };
        grid.appendChild(d);
    });

    function startChat(p) {
        currentPet = p;
        document.getElementById('page1').style.display = 'none';
        document.getElementById('page2').style.display = 'flex';
        document.getElementById('petName').innerText = p.i + " " + p.n;
        addLog('pet', p.n + "だ。君を独り言にはさせない。今の恐怖や不安、ボクにぶつけて。");
    }

    function goHome() {
        document.getElementById('page1').style.display = 'flex';
        document.getElementById('page2').style.display = 'none';
        document.getElementById('log').innerHTML = "";
    }

    function addLog(type, txt) {
        var log = document.getElementById('log');
        var d = document.createElement('div');
        d.className = 'msg ' + type;
        d.innerText = txt;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    function doTalk() {
        var inp = document.getElementById('userInput');
        var val = inp.value.trim();
        if(!val) return;
        addLog('user', val);
        inp.value = "";

        setTimeout(function() {
            var res = "";
            if(currentPet.m === "logic") res = "「"+val+"」という事態。ボクの意見は、感情を殺して物理的な防衛（証拠確保・施錠）を最優先しろ、だ。";
            else if(currentPet.m === "hot") res = "「"+val+"」だと！ふざけるな。君を怯えさせる奴をボクは絶対に許さない。戦う意志を持て！";
            else res = "「"+val+"」…辛かったね。ボクは君の味方だ。一人で抱え込まず、ボクに全部預けて。";
            
            res += " このボクの意見、君はどう思う？";
            addLog('pet', res);
        }, 800);
    }
</script>
</body>
</html>
