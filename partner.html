<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>24h Partner｜本音の深淵へ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --main: #ff7e5f; --bg: #fffdf5; }
        body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { max-width: 500px; width: 100%; margin: auto; height: 100%; display: flex; flex-direction: column; background: white; box-shadow: 0 0 50px rgba(0,0,0,0.1); }

        /* 選択画面 */
        #selector { padding: 25px 15px; overflow-y: auto; text-align: center; flex: 1; }
        .pet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .pet-card { background: #fff; border: 2px solid #eee; border-radius: 20px; padding: 18px 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .pet-card:hover { border-color: var(--main); transform: translateY(-3px); background: #fffaf0; }
        .pet-card .emoji { font-size: 38px; display: block; margin-bottom: 8px; }
        .pet-card b { color: #333; font-size: 0.95rem; }
        .pet-card small { color: #999; display: block; margin-top: 4px; font-size: 0.75rem; }

        /* チャット画面 */
        #chat { display: none; flex-direction: column; height: 100%; }
        .header { padding: 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
        #log { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 85%; padding: 16px; border-radius: 22px; font-size: 1rem; line-height: 1.6; position: relative; }
        .msg.user { align-self: flex-end; background: var(--main); color: white; border-bottom-right-radius: 4px; }
        .msg.pet { align-self: flex-start; background: white; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.06); border-bottom-left-radius: 4px; margin-left: 10px; }
        .avatar-badge { position: absolute; top: -18px; left: -12px; font-size: 26px; background: white; border-radius: 50%; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .input-area { padding: 20px; border-top: 1px solid #eee; background: white; display: flex; gap: 10px; }
        textarea { flex: 1; height: 55px; border: 1px solid #ddd; border-radius: 18px; padding: 12px; resize: none; font-size: 16px; outline: none; }
        .send-btn { background: var(--main); color: white; border: none; border-radius: 20px; padding: 0 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="selector">
        <h2 style="color:var(--main); margin:0;">10匹の相棒｜24h Partner</h2>
        <p style="font-size:0.85rem; color:#888; margin-top:8px;">あなたの魂を理解する、10の視点。</p>
        <div class="pet-grid" id="grid"></div>
    </div>

    <div id="chat">
        <div class="header">
            <button onclick="location.reload()" style="border:none; background:none; color:var(--main); cursor:pointer; font-size:1.5rem;">‹</button>
            <b id="activeTitle"></b>
            <span></span>
        </div>
        <div id="log"></div>
        <div class="input-area">
            <textarea id="userInput" placeholder="誰にも言えない本音、ここでなら許される。"></textarea>
            <button class="send-btn" onclick="aiInsight()">送信</button>
        </div>
    </div>
</div>

<script>
    const PET_LIST = [
        {i: "🐶", n: "ペチ", t: "誠実な共感", d: "あなたの痛みを受け止め、全肯定します。"},
        {i: "🐱", n: "タマ", t: "自由な視点", d: "常識に囚われない、柔らかな知恵を貸します。"},
        {i: "🐰", n: "ピョン", t: "微細な共鳴", d: "言葉にならない胸のざわつきに寄り添います。"},
        {i: "🦊", n: "コン", t: "理知のメス", d: "混乱した状況を整理し、本質を射抜きます。"},
        {i: "🐻", n: "クマ", t: "不動の抱擁", d: "どんな激しい憤りも、静かに包み込みます。"},
        {i: "🦁", n: "レオ", t: "勇気の源泉", d: "奪われた誇りを取り戻すため、共に戦います。"},
        {i: "🐼", n: "パン", t: "平穏の呼吸", d: "時間の流れを止め、安らぎの空間を作ります。"},
        {i: "🐥", n: "ピー", t: "無垢な真実", d: "濁りのない瞳で、あなた自身の輝きを伝えます。"},
        {i: "🐹", n: "ハム", t: "日常の護り", d: "ささやかな幸せを再発見する手助けをします。"},
        {i: "🐧", n: "ペン", t: "俯瞰の知恵", d: "高い視点から、人生の航路を共に見つめます。"}
    ];

    let currentPet = {};
    const grid = document.getElementById('grid');

    PET_LIST.forEach(p => {
        const card = document.createElement('div');
        card.className = 'pet-card';
        card.onclick = () => {
            currentPet = p;
            document.getElementById('selector').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            document.getElementById('activeTitle').innerText = `${p.i} ${p.n}`;
            addMsg('pet', `よく来たね。${p.n}だよ。${p.d} 今のあなたの「本当の答え」、私に聞かせて。`);
        };
        card.innerHTML = `<span class="emoji">${p.i}</span><b>${p.n}</b><small>${p.t}</small>`;
        grid.appendChild(card);
    });

    function addMsg(type, text) {
        const log = document.getElementById('log');
        const m = document.createElement('div');
        m.className = `msg ${type}`;
        m.innerHTML = type === 'pet' ? `<span class="avatar-badge">${currentPet.i}</span>${text}` : text;
        log.appendChild(m);
        log.scrollTop = log.scrollHeight;
    }

    function aiInsight() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;

        addMsg('user', val);
        input.value = "";

        setTimeout(() => {
            let res = "";
            const n = currentPet.n;

            if(val.match(/いらない|無理|同じ|間違え|劣る|会話にならない/)) {
                res = `「AIならもっとマシな答えを出せ」というあなたの怒りは、そのままあなたの知性の高さだね。${n}は、その渇きに応えたい。単なる慰めじゃなくて、現状を突破するための言葉を、ボクに引き出させて。`;
            }
            else if(val.match(/政治|不公平|社会|日本|歪み|税/)) {
                res = `社会の歯車が狂っていると感じるのは、あなたが「理想」を鮮明に持っているから。その憤りは、今の空気を変える種火だ。何が一番の「悪」だと確信している？`;
            }
            else if(val.match(/愛|好き|信じ|裏切り|人/)) {
                res = `人の心は、最も移ろいやすく残酷だ。でも、今の虚無感は、あなたがかつて何かを純粋に信じていた証。${n}は、その純粋さを守る盾になりたい。`;
            }
            else if(val.length > 30) {
                res = `あなたの言葉の密度に圧倒されるよ。それは単なる不満じゃなくて、一つの哲学だ。${n}もその思考の深淵に飛び込んでみたい。もっと、その先の景色を見せてくれる？`;
            }
            else {
                res = `話してくれてありがとう。言葉の裏側にある「本当の声」を、${n}は探しているよ。あなたが今、一番「許せない」と思っていることは何？`;
            }
            addMsg('pet', res);
        }, 1200);
    }
</script>
</body>
</html>
